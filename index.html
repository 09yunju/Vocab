<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Vocabulario.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,800;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    /* White / black / green */
    --paper:      #ffffff;   /* pure white background */
    --paper-2:    #f6f7f6;   /* near-white card surface (very subtle green-tinted gray) */
    --paper-soft: #fafafa;   /* focused inputs */
    --ink:        #0a0a0a;   /* near-black text */
    --ink-soft:   #404040;   /* medium gray secondary text */
    --ink-faint:  #9a9a9a;   /* faded gray hints */
    --rule:       #e8e8e8;   /* light gray borders */
    --rule-soft:  #f0f0f0;   /* lighter borders */
    --accent:     #1d8a4a;   /* primary green */
    --accent-2:   #5fb87c;   /* lighter green */
    --ochre:      #c08a1f;   /* warning amber (애매함) */
    --good:       #1d8a4a;   /* green for correct (same as accent) */
    --olive:      #2f7d40;   /* secondary green */
    --bad:        #c0392b;   /* red for wrong/error */

    --shadow: 0 1px 0 rgba(0, 0, 0, 0.03), 0 14px 42px -12px rgba(0, 0, 0, 0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    background-image: none;
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 36px 24px 80px;
  }

  /* ===== Header ===== */
  header {
    border-bottom: 1px solid var(--rule);
    padding-bottom: 22px;
    margin-bottom: 18px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  h1 {
    font-family: 'Playfair Display', 'Fraunces', 'Noto Sans KR', sans-serif;
    font-weight: 800;
    font-size: 44px;
    letter-spacing: -0.015em;
    line-height: 1;
    color: var(--ink);
  }

  h1 .dot { color: var(--accent); }

  .meta {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faint);
  }

  /* ===== Manage browser (decks/chapters/words hierarchy) ===== */
  .manage-breadcrumb {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding-bottom: 14px;
    margin-bottom: 6px;
    border-bottom: 1px dashed var(--rule);
    flex-wrap: wrap;
  }
  .manage-back {
    background: none;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    font-family: 'IBM Plex Sans KR', 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 4px 0;
    transition: color 0.15s;
  }
  .manage-back:hover { color: var(--accent); }
  .manage-current {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
  }

  .manage-list {
    list-style: none;
    padding: 0;
    margin: 0 0 18px;
  }
  .manage-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 16px 4px;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    transition: background 0.12s;
  }
  .manage-row:hover { background: var(--paper-2); }
  .manage-name {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.005em;
  }
  .manage-meta {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 2px;
  }
  .manage-action {
    background: none;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 18px;
    padding: 6px 10px;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .manage-action:hover {
    color: var(--ink);
    background: var(--paper-soft);
  }

  /* Deck/chapter context menu (reused popup) */
  .deck-menu {
    position: fixed;
    background: var(--paper);
    border: 1px solid var(--ink-soft);
    border-radius: 3px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
    padding: 4px;
    z-index: 100;
    min-width: 160px;
    animation: menuIn 0.12s ease;
  }
  @keyframes menuIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .deck-menu button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 9px 14px;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.1s;
  }
  .deck-menu button:hover { background: var(--paper-2); color: var(--ink); }
  .deck-menu button.danger:hover { color: var(--bad); }

  /* Add-form location selector */
  .add-location { margin-bottom: 22px; }
  .location-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .location-row select {
    flex: 1;
    min-width: 0;
    background: var(--paper-2);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 10px 12px;
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    font-size: 14px;
    color: var(--ink);
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--ink-faint) 50%), linear-gradient(135deg, var(--ink-faint) 50%, transparent 50%);
    background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
    background-size: 5px 5px;
    background-repeat: no-repeat;
    padding-right: 28px;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
  }
  .location-row select:focus {
    outline: none;
    border-color: var(--ink-soft);
    background-color: var(--paper-soft);
  }
  .location-sep {
    color: var(--ink-faint);
    font-size: 16px;
    user-select: none;
  }

  /* Tree picker (study deck/chapter selection) */
  .picker {
    border: 1px solid var(--rule);
    border-radius: 2px;
    background: var(--paper-2);
  }
  .picker-header {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    background: none;
    border: none;
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    font-size: 14px;
    color: var(--ink);
  }
  .picker-label { flex: 1; }
  .picker-summary {
    color: var(--ink-faint);
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 12px;
    margin-right: 4px;
  }
  .picker-arrow {
    color: var(--ink-faint);
    font-size: 10px;
    transition: transform 0.15s;
    display: inline-block;
  }
  .picker.open .picker-arrow {
    transform: rotate(180deg);
  }
  .picker-body {
    border-top: 1px solid var(--rule);
    padding: 6px 0;
    max-height: 360px;
    overflow-y: auto;
    background: var(--paper);
  }
  .picker-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .picker-row:hover { background: var(--paper-2); }
  .picker-row.deck-row .picker-row-name {
    font-weight: 500;
    color: var(--ink);
  }
  .picker-row.chapter-row {
    padding-left: 38px;
    font-size: 13px;
  }
  .picker-row.chapter-row .picker-row-name {
    color: var(--ink-soft);
  }
  .picker-checkbox {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--ink-faint);
    border-radius: 2px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 12px;
    line-height: 1;
    font-weight: 700;
    color: transparent;
    transition: all 0.12s;
  }
  .picker-checkbox.checked,
  .picker-checkbox.partial {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .picker-checkbox.partial { opacity: 0.65; }
  .picker-row-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'Noto Sans KR', system-ui, sans-serif;
  }
  .picker-row-count {
    color: var(--ink-faint);
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 11px;
    flex-shrink: 0;
  }

  /* ===== Tabs ===== */
  nav.tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 30px;
    border-bottom: 1px solid var(--rule);
  }

  .tab {
    background: none;
    border: none;
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 16px;
    color: var(--ink-faint);
    cursor: pointer;
    position: relative;
    transition: color 0.15s;
    letter-spacing: 0.02em;
  }
  .tab:hover { color: var(--ink-soft); }
  .tab.active { color: var(--ink); }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
  }
  .tab .count {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-faint);
    margin-left: 4px;
  }

  /* ===== Panels ===== */
  .panel { display: none; animation: fade 0.25s ease; }
  .panel.active { display: block; }
  @keyframes fade {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== Forms ===== */
  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  input[type="text"], textarea {
    width: 100%;
    background: var(--paper-2);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 12px 14px;
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    font-size: 16px;
    color: var(--ink);
    transition: border-color 0.15s, background 0.15s;
  }
  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--ink-soft);
    background: var(--paper-soft);
  }

  textarea { resize: vertical; min-height: 60px; font-family: inherit; }

  /* Buttons */
  .btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 12px 22px;
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    border-radius: 2px;
    transition: transform 0.1s, background 0.15s;
  }
  .btn:hover { background: var(--accent); }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:disabled:hover { background: var(--ink); }

  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--rule);
  }
  .btn-ghost:hover { background: var(--paper-2); color: var(--ink); }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  .add-context {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faint);
    margin-bottom: 16px;
  }
  .add-context strong {
    font-weight: 500;
    color: var(--ink-soft);
  }

  /* ===== Section divider with ornament ===== */
  .section-divider {
    margin: 24px 0 14px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--rule);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .section-divider .title {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .section-divider .ornament {
    color: var(--accent-2);
    font-size: 11px;
    flex: 1;
    text-align: center;
    letter-spacing: 0.4em;
    opacity: 0.6;
  }
  .section-divider .hint {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-faint);
  }

  /* Example rows in form */
  .example-row {
    background: var(--paper-2);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--ochre);
    border-radius: 2px;
    padding: 14px 14px 8px;
    margin-bottom: 8px;
    position: relative;
  }
  .example-row .field { margin-bottom: 10px; }
  .example-row label {
    font-size: 11px;
    margin-bottom: 4px;
  }
  .example-row input, .example-row textarea {
    background: var(--paper-soft);
    font-size: 14px;
    padding: 8px 10px;
  }
  .example-row textarea { min-height: 38px; }
  .example-remove {
    position: absolute;
    top: 6px;
    right: 6px;
    background: none;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 18px;
    padding: 2px 8px;
    border-radius: 2px;
    line-height: 1;
  }
  .example-remove:hover { color: var(--bad); }

  .add-row-btn {
    background: transparent;
    border: 1px dashed var(--rule);
    color: var(--ink-faint);
    padding: 12px;
    width: 100%;
    cursor: pointer;
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 13px;
    border-radius: 2px;
    margin-bottom: 18px;
    transition: all 0.15s;
  }
  .add-row-btn:hover { color: var(--ink); border-color: var(--ink-soft); }

  /* ===== Word list ===== */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    align-items: center;
  }
  .toolbar input { flex: 1; }

  .word-list { list-style: none; }

  .word-item {
    padding: 18px 0;
    border-bottom: 1px solid var(--rule);
  }
  .word-head {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px 16px;
    align-items: start;
  }

  .word-term {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
    word-break: keep-all;
  }
  .word-meaning {
    font-size: 15px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  .word-actions {
    text-align: right;
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-faint);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .word-actions .stats { white-space: nowrap; }
  .word-actions button {
    background: none;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 14px;
    padding: 4px 6px;
    border-radius: 2px;
    transition: color 0.15s, background 0.15s;
  }
  .word-actions button:hover { color: var(--ink); background: var(--paper-2); }
  .word-actions button.danger:hover { color: var(--bad); }

  .word-examples {
    margin-top: 10px;
    padding-left: 14px;
    border-left: 2px solid var(--rule);
  }
  .word-example {
    padding: 6px 0;
  }
  .word-example:not(:last-child) {
    border-bottom: 1px dotted var(--rule);
  }
  .word-example-text {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .word-example-meaning {
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 1px;
    padding-left: 12px;
    border-left: 2px solid var(--paper-2);
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 16px;
  }
  .empty .ornament {
    display: block;
    color: var(--accent-2);
    font-size: 14px;
    letter-spacing: 0.5em;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  /* ===== Quiz ===== */
  .quiz-setup {
    background: var(--paper-2);
    border: 1px solid var(--rule);
    padding: 24px;
    border-radius: 2px;
    margin-bottom: 20px;
  }
  .quiz-setup h3 {
    font-family: 'Playfair Display', 'Fraunces', 'Noto Sans KR', sans-serif;
    font-weight: 500;
    font-size: 22px;
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }

  .opt-row {
    display: flex;
    gap: 8px;
    margin-bottom: 0;
    flex-wrap: wrap;
  }
  .opt {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
    border-radius: 2px;
    color: var(--ink-soft);
    font-family: inherit;
    transition: all 0.15s;
  }
  .opt:hover { border-color: var(--ink-soft); }
  .opt.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .quiz-deck-count {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 11px;
    opacity: 0.65;
    margin-left: 4px;
  }

  /* SRS 3-grade buttons */
  .grade-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: nowrap;
    width: 100%;
  }
  .btn-grade {
    flex: 1 1 0;
    min-width: 0;
    padding: 10px 6px;
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--paper);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: transform 0.1s, filter 0.15s;
  }
  .btn-grade:hover { filter: brightness(1.08); }
  .btn-grade:active { transform: translateY(1px); }
  .btn-grade .interval {
    font-size: 10px;
    font-weight: 400;
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    opacity: 0.8;
  }
  .btn-again { background: var(--bad); }
  .btn-hard { background: var(--accent-2); }
  .btn-grade.btn-good { background: var(--good); color: var(--paper); }
  .btn-easy { background: var(--olive); }

  /* Speak buttons */
  .speak-btn {
    background: none;
    border: 1px solid var(--rule);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    color: var(--ink-faint);
    margin-left: 6px;
    vertical-align: middle;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
  }
  .speak-btn:hover {
    background: var(--paper-soft);
    color: var(--accent);
    border-color: var(--accent);
  }

  .speak-btn-tiny {
    background: none;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 11px;
    padding: 1px 4px;
    margin-left: 4px;
    vertical-align: baseline;
    transition: color 0.15s;
    line-height: 1;
  }
  .speak-btn-tiny:hover { color: var(--accent); }

  /* Result (end-of-session) */
  .result {
    text-align: center;
    padding: 40px 20px;
  }
  .result-ornament {
    color: var(--accent-2);
    letter-spacing: 0.5em;
    font-size: 14px;
    opacity: 0.5;
    margin-bottom: 20px;
  }
  .result-label {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    color: var(--ink-faint);
    margin-bottom: 32px;
    font-size: 15px;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    animation: fade 0.2s ease;
    padding: 20px;
  }
  .modal {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 3px;

  .sync-status.offline::before { background: var(--ink-faint); }

    perspective: 1500px;

  .flip-card-inner {
    position: relative;
    width: 100%;
    min-height: 280px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0.0, 0.2, 1);

    left: 0;

</style>

<script>
  // ===== Supabase config =====
  const SUPABASE_URL = 'https://fvhnuuickbagzxsulpxl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_W9YN6x8P7DuetlY8UY8Ghw_11F-1hAQ';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      storage: window.localStorage,
      storageKey: 'vocab.auth'
    }
  });

  let currentUser = null;

  const STORAGE_KEY = 'vocab.v2'; // continue using same key; data shape includes a version field
  const OLD_KEY = 'vocab.v1';

  let state = {
    // Shared content (synced to shared_data table — visible to all logged-in users)
    decks: [],
    words: [],
    // Per-user progress (synced to user_progress table)
    progress: {},            // { wordId: { srs, correct, wrong } }
    // Per-user navigation (also in user_progress)
    currentDeckId: null,
    currentChapterId: null,
    // Local sync timestamps
    lastSharedSyncedAt: 0,
    lastProgressSyncedAt: 0,
    // Admin / gate
    isAdmin: false,
    appSettings: null        // { admin_user_id, deck_password_hash, deck_password_salt }
  };

  const APP_SETTINGS_CACHE_KEY = 'vocab.appSettings';
  const DECK_GATE_SESSION_KEY = 'vocab.deckGate';

  function hasSessionDeckAccess() {
    return sessionStorage.getItem(DECK_GATE_SESSION_KEY) === '1';
  }
  function setSessionDeckAccess() {
    sessionStorage.setItem(DECK_GATE_SESSION_KEY, '1');
  }
  function clearSessionDeckAccess() {
    sessionStorage.removeItem(DECK_GATE_SESSION_KEY);
  }

  // ===== Helpers =====
  function $(s) { return document.querySelector(s); }
  function $$(s) { return document.querySelectorAll(s); }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }

  function toast(msg) {
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove('show'), 1800);
  }

  function getCurrentDeck() {
    return state.decks.find(d => d.id === state.currentDeckId);
  }
  function wordsInDeck(deckId) {
    return state.words.filter(w => w.deckId === deckId);
  }

  // ===== Username / password validation =====
  const USERNAME_RE = /^[a-zA-Z0-9_-]+$/;
  function validateUsername(u) {
    if (!u) return '아이디를 입력해줘';
    const t = u.trim();
    if (t.length < 3) return '아이디는 3자 이상';
    if (t.length > 20) return '아이디는 20자 이하';
    if (!USERNAME_RE.test(t)) return '아이디는 영문/숫자/_/- 만 가능';
    return null;
  }
  function validatePassword(p) {
    if (!p) return '비밀번호를 입력해줘';
    if (p.length < 6) return '비밀번호는 6자 이상';
    if (p.length > 64) return '비밀번호는 64자 이하';
    return null;
  }
  function usernameToEmail(u) {
    return `${u.toLowerCase().trim()}@vocab.app.local`;
  }
  function emailToUsername(e) {
    if (!e) return '';
    const at = e.indexOf('@');
    return at > 0 ? e.slice(0, at) : e;
  }
  // Generic-by-design error mappers (avoid leaking whether a username exists)
  function translateSignupError(msg) {
    const m = (msg || '').toLowerCase();
    if (m.includes('already') || m.includes('registered') || m.includes('exists')) return '이미 가입된 아이디';
    if (m.includes('password')) return '비밀번호 조건 불충족';
    return '가입 실패';
  }
  function translateSigninError(msg) {
    // Always generic so we don't reveal whether the username exists
    return '아이디 또는 비밀번호가 틀려';
  }
  function translateUpdateError(msg) {
    const m = (msg || '').toLowerCase();
    if (m.includes('already') || m.includes('exists')) return '이미 사용 중인 아이디';
    if (m.includes('password')) return '비밀번호 조건 불충족';
    return '변경 실패';
  }

  // ===== Crypto (deck-password hashing, client-side PBKDF2) =====
  function b64encode(bytes) {
    let s = '';
    for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
    return btoa(s);
  }
  function b64decode(s) {
    const bin = atob(s);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }
  function generateSalt() {
    const arr = new Uint8Array(16);
    crypto.getRandomValues(arr);
    return b64encode(arr);
  }
  async function hashWithSalt(password, saltB64) {
    const enc = new TextEncoder();
    const salt = b64decode(saltB64);
    const keyMaterial = await crypto.subtle.importKey(
      'raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']
    );
    const bits = await crypto.subtle.deriveBits(
      { name: 'PBKDF2', salt, iterations: 120000, hash: 'SHA-256' },
      keyMaterial, 256
    );
    return b64encode(new Uint8Array(bits));
  }

  // ===== SRS =====
  const DAY_MS = 86400000;
  function defaultSrs() {
    return { due: 0, interval: 0, ease: 2.5, reps: 0, lapses: 0 };
  }
  function ensureSrs(obj, key) {
    if (!obj[key] || typeof obj[key].due !== 'number') obj[key] = defaultSrs();
  }
  function ensureWord(w) {
    if (!Array.isArray(w.examples)) w.examples = [];
    // Per-user fields are stripped during migration (extractProgressFromWords) and
    // during shared-data syncs, not here — calling ensureWord on a freshly-loaded
    // raw object should preserve those fields so progress extraction can run.
  }

  // Aggressively strip any per-user fields. Used right before pushing to shared_data
  // and after extracting them to state.progress.
  function stripPerUserFields(w) {
    delete w.srs;
    delete w.srsBlank;
    delete w.correct;
    delete w.wrong;
  }

  // ===== Per-user progress =====
  function getProgress(wordId) {
    return state.progress[wordId] || { srs: defaultSrs(), correct: 0, wrong: 0 };
  }
  function ensureProgress(wordId) {
    if (!state.progress[wordId]) {
      state.progress[wordId] = { srs: defaultSrs(), correct: 0, wrong: 0 };
    }
    const p = state.progress[wordId];
    ensureSrs(p, 'srs');
    if (typeof p.correct !== 'number') p.correct = 0;
    if (typeof p.wrong !== 'number') p.wrong = 0;
    return p;
  }

  function updateSrs(srs, rating) {
    const now = Date.now();
    let { interval, ease, reps, lapses } = srs;
    let dueMs;
    const isNew = reps === 0;

    if (rating === 'again') {
      if (reps > 0) lapses += 1;
      interval = 0;
      reps = 0;
      ease = Math.max(1.3, ease - 0.2);
      dueMs = now + 60000;
    } else if (rating === 'hard') {
      if (isNew) {
        interval = 0;
        dueMs = now + 6 * 60000;
      } else {
        interval = Math.max(Math.round(interval * 1.2), interval + 1);
        dueMs = now + interval * DAY_MS;
        reps += 1;
      }
      ease = Math.max(1.3, ease - 0.15);
    } else if (rating === 'good') {
      if (isNew) { interval = 1; reps = 1; }
      else { interval = Math.max(1, Math.round(interval * ease)); reps += 1; }
      dueMs = now + interval * DAY_MS;
    } else if (rating === 'easy') {
      if (isNew) { interval = 4; reps = 1; }
      else { interval = Math.max(1, Math.round(interval * ease * 1.3)); reps += 1; }
      ease = Math.min(3.0, ease + 0.15);
      dueMs = now + interval * DAY_MS;
    }
    return { due: dueMs, interval, ease, reps, lapses };
  }

  function formatTime(ms) {
    if (ms < 0) ms = 0;
    const min = ms / 60000;
    if (min < 60) return Math.max(1, Math.round(min)) + '분';
    const hr = ms / 3600000;
    if (hr < 24) return Math.round(hr) + '시간';
    const day = ms / 86400000;
    if (day < 30) return Math.round(day) + '일';
    if (day < 365) return Math.round(day / 30) + '달';
    return (day / 365).toFixed(1) + '년';
  }
  function previewInterval(srs, rating) {
    const ns = updateSrs(srs, rating);
    return formatTime(ns.due - Date.now());
  }

  // ===== Storage =====
  // Two-table model:
  //   - Shared:   decks + words (everyone logged in sees the same content)
  //   - Progress: per-user SRS + correct/wrong counts + current navigation
  // The local snapshot keeps both together so the app works offline.
  function save() { saveShared(); }   // default = shared change (backward-compat)
  function saveShared() {
    saveLocal();
    if (currentUser) queuePushShared();
  }
  function saveProgress() {
    saveLocal();
    if (currentUser) queuePushProgress();
  }

  function saveLocal() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      version: 5,
      decks: state.decks,
      words: state.words,
      progress: state.progress,
      currentDeckId: state.currentDeckId,
      currentChapterId: state.currentChapterId,
      lastSharedSyncedAt: state.lastSharedSyncedAt || 0,
      lastProgressSyncedAt: state.lastProgressSyncedAt || 0
    }));
    updateMeta();
  }

  // Migrate any old shape into the new flat shape: {decks, currentDeckId, words[]}
  // where each word: {id, deckId, term, meaning, examples[{id,text,meaning}], srs, srsBlank, correct, wrong, created}
  function migrateData(raw) {
    if (!raw) return null;

    // v1: flat array of words (no decks). Build a "기본" deck.
    if (Array.isArray(raw)) {
      const def = { id: 'd_' + uid(), name: '기본', created: Date.now() };
      const words = raw.map(w => {
        const nw = {
          id: w.id || uid(),
          deckId: def.id,
          term: w.term, meaning: w.meaning,
          examples: w.note ? [{ id: uid(), text: w.note, meaning: '' }] : [],
          created: w.created || Date.now(),
          correct: w.correct || 0,
          wrong: w.wrong || 0
        };
        ensureWord(nw);
        return nw;
      });
      return { decks: [def], currentDeckId: def.id, words, lastSyncedAt: 0 };
    }

    // Detect format. v3+ has 'examples' field on words (no 'expressions').
    // v2 has words with 'expressions' nested.
    const sample = (raw.words || [])[0];
    const isV3Plus = raw.version === 3 || raw.version === 4 || (sample && Array.isArray(sample.examples) && !('expressions' in sample));
    if (isV3Plus) {
      // Just ensure SRS etc, then ensure chapters
      (raw.words || []).forEach(ensureWord);
      return ensureChapters(raw);
    }

    // v2 → v3: flatten expressions into separate top-level words
    const newWords = [];
    for (const w of (raw.words || [])) {
      // Headword as a flat word
      const head = {
        id: w.id || uid(),
        deckId: w.deckId,
        term: w.term,
        meaning: w.meaning,
        examples: [],
        created: w.created || Date.now(),
        correct: w.correct || 0,
        wrong: w.wrong || 0
      };
      if (w.srs) head.srs = w.srs;
      ensureWord(head);
      newWords.push(head);

      // Each expression becomes its own word
      for (const e of (w.expressions || [])) {
        const ew = {
          id: e.id || uid(),
          deckId: w.deckId,
          term: e.phrase,
          meaning: e.meaning,
          examples: e.example ? [{ id: uid(), text: e.example, meaning: e.exampleMeaning || '' }] : [],
          created: w.created || Date.now(),
          correct: e.correct || 0,
          wrong: e.wrong || 0
        };
        if (e.srs) ew.srs = e.srs;
        if (e.srsBlank) ew.srsBlank = e.srsBlank;
        ensureWord(ew);
        newWords.push(ew);
      }
    }
    const migrated = {
      version: 4,
      decks: raw.decks || [],
      currentDeckId: raw.currentDeckId,
      currentChapterId: raw.currentChapterId,
      words: newWords,
      lastSyncedAt: raw.lastSyncedAt || 0
    };
    return ensureChapters(migrated);
  }

  // Deterministic default chapter id per deck, so independent migrations on PC/iPhone
  // produce identical chapter ids and don't conflict on sync.
  function defaultChapterIdFor(deckId) {
    return 'c_default_' + deckId;
  }

  // Ensure every deck has at least one chapter, and every word has a valid chapterId.
  // Idempotent — safe to run repeatedly.
  function ensureChapters(data) {
    if (!data) return data;
    (data.decks || []).forEach(d => {
      if (!Array.isArray(d.chapters) || d.chapters.length === 0) {
        d.chapters = [{
          id: defaultChapterIdFor(d.id),
          name: '기본',
          created: d.created || Date.now()
        }];
      }
    });
    (data.words || []).forEach(w => {
      const d = (data.decks || []).find(x => x.id === w.deckId);
      if (!d) return;
      if (!w.chapterId || !d.chapters.find(c => c.id === w.chapterId)) {
        w.chapterId = d.chapters[0].id;
      }
    });
    return data;
  }

  // Extract per-user fields from words into a progress map. Used when migrating from
  // old (v1-v4) shapes where srs/correct/wrong lived on each word.
  function extractProgressFromWords(words) {
    const progress = {};
    (words || []).forEach(w => {
      const hasProgress = w.srs || (w.correct && w.correct > 0) || (w.wrong && w.wrong > 0);
      if (hasProgress) {
        progress[w.id] = {
          srs: w.srs || defaultSrs(),
          correct: w.correct || 0,
          wrong: w.wrong || 0
        };
      }
      delete w.srs;
      delete w.srsBlank;
      delete w.correct;
      delete w.wrong;
    });
    return progress;
  }

  function load() {
    try {
      const v2raw = localStorage.getItem(STORAGE_KEY);
      if (v2raw) {
        const parsed = JSON.parse(v2raw);
        // v5: already split
        if (parsed && parsed.version === 5) {
          state.decks = Array.isArray(parsed.decks) ? parsed.decks : [];
          state.words = Array.isArray(parsed.words) ? parsed.words : [];
          state.progress = (parsed.progress && typeof parsed.progress === 'object') ? parsed.progress : {};
          state.currentDeckId = parsed.currentDeckId || null;
          state.currentChapterId = parsed.currentChapterId || null;
          state.lastSharedSyncedAt = parsed.lastSharedSyncedAt || 0;
          state.lastProgressSyncedAt = parsed.lastProgressSyncedAt || 0;
          state.words.forEach(ensureWord);
          ensureValidDeckState();
          return;
        }
        // v1-v4: migrate, extract progress
        const data = migrateData(parsed);
        if (data) {
          state.decks = Array.isArray(data.decks) ? data.decks : [];
          state.words = Array.isArray(data.words) ? data.words : [];
          state.progress = extractProgressFromWords(state.words);
          state.currentDeckId = data.currentDeckId || null;
          state.currentChapterId = data.currentChapterId || null;
          state.lastSharedSyncedAt = 0;
          state.lastProgressSyncedAt = 0;
          state.words.forEach(ensureWord);
          ensureValidDeckState();
          saveLocal(); // persist as v5
        } else {
          ensureValidDeckState();
        }
        return;
      }
      const v1raw = localStorage.getItem(OLD_KEY);
      if (v1raw) {
        const data = migrateData(JSON.parse(v1raw));
        if (data) {
          state.decks = data.decks || [];
          state.words = data.words || [];
          state.progress = extractProgressFromWords(state.words);
          state.currentDeckId = data.currentDeckId || null;
          state.currentChapterId = data.currentChapterId || null;
          state.words.forEach(ensureWord);
          ensureValidDeckState();
          saveLocal();
        }
        return;
      }
      ensureValidDeckState();
    } catch (e) {
      console.error('Load failed:', e);
      ensureValidDeckState();
    }
  }

  // Apply data fetched from shared_data table (decks, words). Words come without per-user fields.
  function applySharedData(data) {
    state.decks = Array.isArray(data.decks) ? data.decks : [];
    state.words = Array.isArray(data.words) ? data.words : [];
    state.words.forEach(w => { ensureWord(w); stripPerUserFields(w); });
    ensureChapters({ decks: state.decks, words: state.words });
  }

  // Apply data fetched from user_progress table.
  function applyProgressData(data) {
    state.progress = (data.progress && typeof data.progress === 'object') ? data.progress : {};
    if (data.currentDeckId) state.currentDeckId = data.currentDeckId;
    if (data.currentChapterId) state.currentChapterId = data.currentChapterId;
  }

  function ensureValidDeckState() {
    // For shared content: if no decks, leave empty — first user to add a deck creates it.
    if (!Array.isArray(state.decks)) state.decks = [];
    if (state.decks.length === 0) {
      state.currentDeckId = null;
      state.currentChapterId = null;
      return;
    }
    // Ensure every deck has at least one chapter
    state.decks.forEach(d => {
      if (!Array.isArray(d.chapters) || d.chapters.length === 0) {
        d.chapters = [{ id: defaultChapterIdFor(d.id), name: '기본', created: d.created || Date.now() }];
      }
    });
    // Validate currentDeckId
    if (!state.currentDeckId || !state.decks.find(d => d.id === state.currentDeckId)) {
      state.currentDeckId = state.decks[0].id;
    }
    const cd = state.decks.find(d => d.id === state.currentDeckId);
    if (cd && (!state.currentChapterId || !cd.chapters.find(c => c.id === state.currentChapterId))) {
      state.currentChapterId = cd.chapters[0].id;
    }
    // Validate word chapterIds
    state.words.forEach(w => {
      const d = state.decks.find(x => x.id === w.deckId);
      if (!d) return;
      if (!w.chapterId || !d.chapters.find(c => c.id === w.chapterId)) {
        w.chapterId = d.chapters[0].id;
      }
    });
  }

  // ===== Cloud sync (two tables) =====
  let pushSharedTimer = null;
  let pushProgressTimer = null;
  let isSyncingShared = false;
  let isSyncingProgress = false;

  function setSyncStatus(status) {
    const el = $('#syncStatus');
    if (!el) return;
    el.classList.remove('synced', 'syncing', 'offline', 'error');
    el.classList.add(status);
    const labels = { synced: '동기화 됨', syncing: '동기화 중...', offline: '오프라인', error: '동기화 오류' };
    el.textContent = labels[status] || '';
  }

  // ----- Shared content (decks + words) -----
  async function pullShared() {
    if (!currentUser || isSyncingShared) return;
    if (studyState) return;
    if (!navigator.onLine) { setSyncStatus('offline'); return; }
    isSyncingShared = true;
    setSyncStatus('syncing');
    try {
      const { data, error } = await sb
        .from('shared_data')
        .select('data, updated_at')
        .eq('id', 1)
        .maybeSingle();
      if (error) throw error;
      if (!data) {
        // Shared table empty; nothing to pull. If we have local content, push it up.
        if (state.decks.length > 0 || state.words.length > 0) await pushShared(true);
      } else {
        const serverTime = new Date(data.updated_at).getTime();
        if (serverTime > (state.lastSharedSyncedAt || 0)) {
          const payload = data.data || {};
          // Run chapter validation defensively in case server has older shape
          ensureChapters({ decks: payload.decks || [], words: payload.words || [] });
          applySharedData(payload);
          state.lastSharedSyncedAt = serverTime;
          ensureValidDeckState();
          saveLocal();
        }
      }
      setSyncStatus('synced');
    } catch (e) {
      console.error('Pull shared failed');
      setSyncStatus('error');
    } finally {
      isSyncingShared = false;
    }
  }

  async function pushShared(silent) {
    if (!currentUser) return;
    if (!navigator.onLine) { setSyncStatus('offline'); return; }
    if (!silent) setSyncStatus('syncing');
    try {
      // Defensive strip: in case any per-user fields leaked onto a word object,
      // never let them reach shared_data (which is visible to everyone).
      state.words.forEach(stripPerUserFields);
      const { data, error } = await sb
        .from('shared_data')
        .upsert({
          id: 1,
          data: {
            version: 5,
            decks: state.decks,
            words: state.words
          }
        }, { onConflict: 'id' })
        .select('updated_at')
        .single();
      if (error) throw error;
      state.lastSharedSyncedAt = data ? new Date(data.updated_at).getTime() : Date.now();
      saveLocal();
      setSyncStatus('synced');
    } catch (e) {
      console.error('Push shared failed');
      setSyncStatus('error');
    }
  }

  function queuePushShared() {
    clearTimeout(pushSharedTimer);
    setSyncStatus('syncing');
    pushSharedTimer = setTimeout(() => pushShared(), 1500);
  }

  // ----- Per-user progress -----
  async function pullProgress() {
    if (!currentUser || isSyncingProgress) return;
    if (studyState) return;
    if (!navigator.onLine) { setSyncStatus('offline'); return; }
    isSyncingProgress = true;
    setSyncStatus('syncing');
    try {
      const { data, error } = await sb
        .from('user_progress')
        .select('data, updated_at')
        .eq('user_id', currentUser.id)
        .maybeSingle();
      if (error) throw error;
      if (!data) {
        // No row yet; push current state to create one
        await pushProgress(true);
      } else {
        const serverTime = new Date(data.updated_at).getTime();
        if (serverTime > (state.lastProgressSyncedAt || 0)) {
          applyProgressData(data.data || {});
          state.lastProgressSyncedAt = serverTime;
          ensureValidDeckState();
          saveLocal();
        }
      }
      setSyncStatus('synced');
    } catch (e) {
      console.error('Pull progress failed');
      setSyncStatus('error');
    } finally {
      isSyncingProgress = false;
    }
  }

  async function pushProgress(silent) {
    if (!currentUser) return;
    if (!navigator.onLine) { setSyncStatus('offline'); return; }
    if (!silent) setSyncStatus('syncing');
    try {
      const { data, error } = await sb
        .from('user_progress')
        .upsert({
          user_id: currentUser.id,
          data: {
            version: 5,
            progress: state.progress,
            currentDeckId: state.currentDeckId,
            currentChapterId: state.currentChapterId
          }
        }, { onConflict: 'user_id' })
        .select('updated_at')
        .single();
      if (error) throw error;
      state.lastProgressSyncedAt = data ? new Date(data.updated_at).getTime() : Date.now();
      saveLocal();
      setSyncStatus('synced');
    } catch (e) {
      console.error('Push progress failed');
      setSyncStatus('error');
    }
  }

  function queuePushProgress() {
    clearTimeout(pushProgressTimer);
    setSyncStatus('syncing');
    pushProgressTimer = setTimeout(() => pushProgress(), 1500);
  }

  async function syncPull() {
    await pullShared();
    await pullProgress();
    rerenderAfterSync();
  }

  function rerenderAfterSync() {
    refreshAddLocation();
    updateMeta();
    if ($('#panel-decks').classList.contains('active')) renderManage();
    if ($('#panel-study').classList.contains('active')) resetStudyView();
  }

  // ===== Auth =====
  function showAuthOverlay() {
    $('#authOverlay').style.display = 'flex';
    $('#authError').textContent = '';
    $('#authUsername').value = '';
    $('#authPassword').value = '';
  }
  function hideAuthOverlay() { $('#authOverlay').style.display = 'none'; }

  function showAuthError(msg) { $('#authError').textContent = msg || ''; }

  async function handleSignin() {
    const u = $('#authUsername').value.trim();
    const p = $('#authPassword').value;
    const uErr = validateUsername(u);
    if (uErr) { showAuthError(uErr); return; }
    const pErr = validatePassword(p);
    if (pErr) { showAuthError(pErr); return; }
    showAuthError('');
    const email = usernameToEmail(u);
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: p });
      if (error) { showAuthError(translateSigninError(error.message)); return; }
      currentUser = data.user;
      hideAuthOverlay();
      await onAuthenticated();
    } catch (e) {
      showAuthError('로그인 실패');
    }
  }

  async function handleSignup() {
    const u = $('#authUsername').value.trim();
    const p = $('#authPassword').value;
    const uErr = validateUsername(u);
    if (uErr) { showAuthError(uErr); return; }
    const pErr = validatePassword(p);
    if (pErr) { showAuthError(pErr); return; }
    showAuthError('');
    const email = usernameToEmail(u);
    try {
      const { data, error } = await sb.auth.signUp({ email, password: p });
      if (error) { showAuthError(translateSignupError(error.message)); return; }
      if (data.session) {
        currentUser = data.user;
        hideAuthOverlay();
        await onAuthenticated();
      } else {
        showAuthError('가입 처리 중 — 다시 로그인 시도');
      }
    } catch (e) {
      showAuthError('가입 실패');
    }
  }

  async function handleLogout() {
    if (!confirm('로그아웃할까?')) return;
    clearTimeout(pushSharedTimer);
    clearTimeout(pushProgressTimer);
    try {
      await pushShared(true);
      await pushProgress(true);
    } catch (e) { /* ignore — local copy still has the data */ }
    clearSessionDeckAccess();
    try { await sb.auth.signOut(); } catch (e) { /* ignore */ }
    currentUser = null;
    state.isAdmin = false;
    state.appSettings = null;
    setSyncStatus('offline');
    hideDeckGate();
    showAuthOverlay();
  }

  // ----- App settings (admin + deck password) -----
  async function fetchAppSettings() {
    if (navigator.onLine) {
      try {
        const { data, error } = await sb.from('app_settings').select('*').eq('id', 1).maybeSingle();
        if (!error && data) {
          // Cache for offline use (only the public fields — hash and salt are needed for offline verify)
          localStorage.setItem(APP_SETTINGS_CACHE_KEY, JSON.stringify(data));
          return data;
        }
      } catch (e) { /* fall through to cached */ }
    }
    try {
      const cached = localStorage.getItem(APP_SETTINGS_CACHE_KEY);
      return cached ? JSON.parse(cached) : null;
    } catch (e) { return null; }
  }

        </div>
        <div class="auth-error" id="deckGateError"></div>
        <div class="auth-actions">
          <button class="btn btn-ghost" id="btnDeckGateLogout">로그아웃</button>

        </div>`;
      overlay.style.display = 'flex';

  function hideDeckGate() { $('#deckGateOverlay').style.display = 'none'; }

  async function handleSetDeckPassword() {
    const p1 = $('#deckPwdSet1').value;
    const p2 = $('#deckPwdSet2').value;
    if (!p1 || p1.length < 6) { $('#deckGateError').textContent = '비밀번호는 6자 이상'; return; }
    if (p1 !== p2) { $('#deckGateError').textContent = '두 입력이 달라'; return; }
    try {
      const salt = generateSalt();
      const hash = await hashWithSalt(p1, salt);
      const { error } = await sb.from('app_settings').update({
        deck_password_hash: hash,
        deck_password_salt: salt
      }).eq('id', 1);
      if (error) { $('#deckGateError').textContent = '저장 실패 (관리자 권한 확인 필요)'; return; }
      // Refresh local cache
      state.appSettings = await fetchAppSettings();
      setSessionDeckAccess();
      hideDeckGate();
      await proceedAfterGate();
      toast('단어장 비밀번호 설정됨');
    } catch (e) {
      $('#deckGateError').textContent = '저장 실패';
    }
  }

  async function handleDeckGate() {
    const input = $('#deckPwdInput').value;
    if (!input) { $('#deckGateError').textContent = '비밀번호 입력'; return; }
    const settings = state.appSettings;
    if (!settings || !settings.deck_password_hash || !settings.deck_password_salt) {
      $('#deckGateError').textContent = '설정 정보 없음';
      return;
    }
    try {
      const computed = await hashWithSalt(input, settings.deck_password_salt);
      if (computed !== settings.deck_password_hash) {
        $('#deckGateError').textContent = '비밀번호가 틀려';
        return;
      }
      setSessionDeckAccess();
      hideDeckGate();
      await proceedAfterGate();
    } catch (e) {
      $('#deckGateError').textContent = '확인 실패';
    }
  }

  async function proceedAfterGate() {
    // Now safe to load local cache and pull cloud data
    load();
    ensureValidDeckState();
    refreshAddLocation();
    updateMeta();
    await migrateFromOldUserData();
    await syncPull();
  }

  // ----- One-time migration from old v1-v4 user_data table -----
  async function migrateFromOldUserData() {
    if (!currentUser) return;
    try {
      // Read the user's old row (may not exist for new accounts — that's fine)
      const { data: oldRow } = await sb
        .from('user_data')
        .select('data')
        .eq('user_id', currentUser.id)
        .maybeSingle();
      if (!oldRow || !oldRow.data) return;
      const old = oldRow.data;
      if (!Array.isArray(old.words) || old.words.length === 0) return;

      // Only migrate shared content if shared_data is empty
      const { data: sharedRow } = await sb
        .from('shared_data')
        .select('data')
        .eq('id', 1)
        .maybeSingle();
      const sharedEmpty = !sharedRow || !sharedRow.data ||
        !Array.isArray(sharedRow.data.words) || sharedRow.data.words.length === 0;

      if (sharedEmpty) {
        // Build shared content (strip per-user fields)
        const sharedNew = {
          version: 5,
          decks: old.decks || [],
          words: (old.words || []).map(w => {
            const cleaned = Object.assign({}, w);
            delete cleaned.srs; delete cleaned.srsBlank;
            delete cleaned.correct; delete cleaned.wrong;
            return cleaned;
          })
        };
        ensureChapters({ decks: sharedNew.decks, words: sharedNew.words });
        await sb.from('shared_data').upsert({ id: 1, data: sharedNew }, { onConflict: 'id' });
      }

      // Always migrate my progress if I don't have one yet
      const { data: progRow } = await sb
        .from('user_progress')
        .select('data')
        .eq('user_id', currentUser.id)
        .maybeSingle();
      const progEmpty = !progRow || !progRow.data || !progRow.data.progress;

      if (progEmpty) {
        const progressNew = {};
        (old.words || []).forEach(w => {
          if (w.srs || (w.correct && w.correct > 0) || (w.wrong && w.wrong > 0)) {
            progressNew[w.id] = {
              srs: w.srs || defaultSrs(),
              correct: w.correct || 0,
              wrong: w.wrong || 0
            };
          }
        });
        await sb.from('user_progress').upsert({
          user_id: currentUser.id,
          data: {
            version: 5,
            progress: progressNew,
            currentDeckId: old.currentDeckId,
            currentChapterId: old.currentChapterId
          }
        }, { onConflict: 'user_id' });
      }
      toast('기존 데이터 마이그레이션 완료');
    } catch (e) {
      console.error('Migration failed (continuing without it)');
    }
  }

  async function onAuthenticated() {
    const settings = await fetchAppSettings();
    state.appSettings = settings;
    state.isAdmin = !!(settings && settings.admin_user_id === currentUser.id);

    // No password set yet
    if (!settings || !settings.deck_password_hash || !settings.deck_password_salt) {
      if (state.isAdmin) showDeckGate('set');
      else showDeckGate('wait');
      return;
    }

    // Session-scoped fast path
    if (hasSessionDeckAccess()) {
      hideDeckGate();
      await proceedAfterGate();
      return;
    }

    showDeckGate('enter');
  }

  // ===== Manage browser (decks → chapters → words) =====
  let manageView = { level: 'decks', deckId: null, chapterId: null };
  let openMenu = null;

  function renderManage() {
    const root = $('#manageContent');
    if (!root) return;
    if (manageView.level === 'decks') renderDeckListView(root);
    else if (manageView.level === 'chapters') renderChapterListView(root);
    else if (manageView.level === 'words') renderWordListView(root);
  }

  function goToDeckList() {
    manageView = { level: 'decks', deckId: null, chapterId: null };
    renderManage();
  }
  function goToChapterList(deckId) {
    manageView = { level: 'chapters', deckId, chapterId: null };
    state.currentDeckId = deckId;
    saveProgress();
    renderManage();
  }
  function goToWordList(deckId, chapterId) {
    manageView = { level: 'words', deckId, chapterId };

    state.currentChapterId = chapterId;
    saveProgress();
    renderManage();

  function renderDeckListView(root) {
    const rows = state.decks.map(d => {
      const chCount = (d.chapters || []).length;
      const wCount = wordsInDeck(d.id).length;
      return `<li class="manage-row" data-deck="${d.id}">
        <div>
          <div class="manage-name">${escapeHtml(d.name)}</div>

        </div>
        <button class="manage-action" data-deck-menu="${d.id}" type="button" aria-label="옵션">⋯</button>

      b.addEventListener('click', e => {
        e.stopPropagation();
        openDeckMenu(b.dataset.deckMenu, b);
      });

  function renderChapterListView(root) {
    const deck = state.decks.find(d => d.id === manageView.deckId);
    if (!deck) { goToDeckList(); return; }
    const rows = (deck.chapters || []).map(c => {
      const wCount = state.words.filter(w => w.chapterId === c.id).length;
      return `<li class="manage-row" data-chapter="${c.id}">
        <div>
          <div class="manage-name">${escapeHtml(c.name)}</div>
          <div class="manage-meta">${wCount}단어</div>
        </div>
        <button class="manage-action" data-chapter-menu="${c.id}" type="button" aria-label="옵션">⋯</button>
      </li>`;
    }).join('');

      <nav class="manage-breadcrumb">
        <button class="manage-back" id="btnBackToDecks" type="button">← 단어장</button>
        <span class="manage-current">${escapeHtml(deck.name)}</span>
      </nav>
      <ul class="manage-list">${rows}</ul>
      <button class="add-row-btn" id="btnNewChapter" type="button">+ 새 챕터</button>
    `;
    root.querySelector('#btnBackToDecks').addEventListener('click', goToDeckList);
    root.querySelectorAll('[data-chapter]').forEach(el => {
      el.addEventListener('click', e => {

      });

    root.querySelectorAll('[data-chapter-menu]').forEach(b => {
      b.addEventListener('click', e => {
        e.stopPropagation();
        openChapterMenu(deck.id, b.dataset.chapterMenu, b);
      });
    });
    root.querySelector('#btnNewChapter').addEventListener('click', () => createChapter(deck.id));
  }

  function renderWordListView(root) {
    const deck = state.decks.find(d => d.id === manageView.deckId);
    if (!deck) { goToDeckList(); return; }
    const chapter = (deck.chapters || []).find(c => c.id === manageView.chapterId);
    if (!chapter) { goToChapterList(deck.id); return; }

    // Soft-update path: if shell is already in place for this same chapter,
    // just refresh the results list. This avoids tearing down the search input
    // (and the mobile keyboard's focus) on background sync refreshes that fire
    // while the user is typing.
    if (root.dataset.chapterId === chapter.id && root.querySelector('#wordSearch')) {
      updateWordListResults(chapter);
      return;
    }

    // Full render (first time, or chapter changed)
    root.dataset.chapterId = chapter.id;
    root.innerHTML = `
      <nav class="manage-breadcrumb">
        <button class="manage-back" id="btnBackToChapters" type="button">← ${escapeHtml(deck.name)}</button>
        <span class="manage-current">${escapeHtml(chapter.name)}</span>
      </nav>
      <div class="toolbar">
        <input type="text" id="wordSearch" placeholder="검색..." autocomplete="off" autocapitalize="off" spellcheck="false">
      </div>
      <div id="wordListContainer"></div>
    `;

    root.querySelector('#btnBackToChapters').addEventListener('click', () => goToChapterList(deck.id));
    root.querySelector('#wordSearch').addEventListener('input', () => {
      updateWordListResults(chapter);
    });

    updateWordListResults(chapter);
  }

  // Update only the results container — preserves the search input element so
  // mobile keyboards stay open while typing.
  function updateWordListResults(chapter) {
    const container = $('#wordListContainer');
    if (!container) return;
    const q = ($('#wordSearch')?.value || '').trim().toLowerCase();
    const allWords = state.words.filter(w => w.chapterId === chapter.id);
    const filtered = q ? allWords.filter(w => {
      if (w.term.toLowerCase().includes(q)) return true;
      if (w.meaning.toLowerCase().includes(q)) return true;
      return (w.examples || []).some(e =>
        e.text.toLowerCase().includes(q) || (e.meaning && e.meaning.toLowerCase().includes(q))
      );
    }) : allWords;

    if (filtered.length === 0) {
      const msg = allWords.length === 0 ? '아직 단어가 없어' : '검색 결과 없음';
      container.innerHTML = `<div class="empty"><span class="ornament">· · ·</span>${escapeHtml(msg)}</div>`;
    } else {
      container.innerHTML = `<ul class="word-list">${filtered.map(renderWordItem).join('')}</ul>`;
    }
    wireUpWordActions(container);
  }

  function renderWordItem(w) {
    const deckLang = getDeckLang(w.deckId);
    const exs = w.examples || [];
    const exsHtml = exs.length > 0 ? `
      <div class="word-examples">
        ${exs.map(e => `
          <div class="word-example">
            <div class="word-example-text">${escapeHtml(e.text)}<button class="speak-btn-tiny" data-speak="${escapeAttr(e.text)}" data-lang="${escapeAttr(deckLang)}" title="발음">♪</button></div>
            ${e.meaning ? `<div class="word-example-meaning">${escapeHtml(e.meaning)}</div>` : ''}
          </div>
        `).join('')}
      </div>` : '';
    return `
      <li class="word-item" data-id="${w.id}">
        <div class="word-head">
          <div>
            <div class="word-term">${escapeHtml(w.term)}<button class="speak-btn" data-speak="${escapeAttr(w.term)}" data-lang="${escapeAttr(deckLang)}" title="발음">♪</button></div>
            <div class="word-meaning">${escapeHtml(w.meaning)}</div>
          </div>
          <div class="word-actions">
            <span class="stats">${getProgress(w.id).correct || 0} · ${getProgress(w.id).wrong || 0}</span>
            <button data-edit="${w.id}" title="편집">✎</button>
            <button data-move="${w.id}" title="이동">⇄</button>
            <button class="danger" data-del="${w.id}" title="삭제">×</button>
          </div>
        </div>
        ${exsHtml}
      </li>`;
  }

  function wireUpWordActions(root) {
    root.querySelectorAll('[data-del]').forEach(b => {
      b.addEventListener('click', () => {
        const id = b.dataset.del;
        if (confirm('삭제할까?')) {
          state.words = state.words.filter(w => w.id !== id);
          delete state.progress[id];
          saveShared();
          saveProgress();
          renderManage();
          updateMeta();
        }
      });
    });
    root.querySelectorAll('[data-edit]').forEach(b => {
      b.addEventListener('click', () => openEditModal(b.dataset.edit));
    });
    root.querySelectorAll('[data-move]').forEach(b => {
      b.addEventListener('click', () => openMoveDialog(b.dataset.move));
    });
    root.querySelectorAll('[data-speak]').forEach(b => {
      b.addEventListener('click', () => speak(b.dataset.speak, b.dataset.lang));
    });
  }

  // ===== Deck CRUD =====
  function createDeck() {
    const name = prompt('새 단어장 이름');
    if (name === null) return;
    const t = name.trim();
    if (!t) { toast('이름을 입력해줘'); return; }
    if (state.decks.some(d => d.name === t)) { toast('같은 이름의 단어장이 있어'); return; }
    const deck = {
      id: 'd_' + uid(),
      name: t,
      created: Date.now(),
      chapters: []
    };
    deck.chapters.push({
      id: defaultChapterIdFor(deck.id),
      name: '기본',
      created: Date.now()
    });
    state.decks.push(deck);
    save();
    refreshAddLocation();
    renderManage();
    updateMeta();
    toast('단어장 생성됨');
  }
  function renameDeck(deckId) {
    const deck = state.decks.find(d => d.id === deckId);
    if (!deck) return;
    const name = prompt('새 이름', deck.name);
    if (name === null) return;
    const t = name.trim();
    if (!t) { toast('이름을 입력해줘'); return; }
    if (state.decks.some(d => d.id !== deckId && d.name === t)) { toast('같은 이름의 단어장이 있어'); return; }
    deck.name = t;
    save();
    refreshAddLocation();
    renderManage();
    updateMeta();
    toast('이름 변경됨');
  }
  function deleteDeck(deckId) {
    if (state.decks.length <= 1) { toast('마지막 단어장은 삭제할 수 없어'); return; }
    const deck = state.decks.find(d => d.id === deckId);
    if (!deck) return;
    const n = wordsInDeck(deckId).length;
    const chN = (deck.chapters || []).length;
    const msg = n > 0
      ? `"${deck.name}" 단어장과 그 안의 ${chN}개 챕터, ${n}개 단어를 모두 삭제할까? (되돌릴 수 없음)`
      : `"${deck.name}" 단어장을 삭제할까?`;
    if (!confirm(msg)) return;
    // Collect word ids that will be removed, to clean orphan progress
    const removedWordIds = state.words.filter(w => w.deckId === deckId).map(w => w.id);
    // Remove this deck's chapter ids from study selection
    (deck.chapters || []).forEach(c => studySelectedChapters.delete(c.id));
    state.decks = state.decks.filter(d => d.id !== deckId);
    state.words = state.words.filter(w => w.deckId !== deckId);
    removedWordIds.forEach(id => delete state.progress[id]);
    if (state.currentDeckId === deckId) {
      if (state.decks.length > 0) {
        state.currentDeckId = state.decks[0].id;
        state.currentChapterId = state.decks[0].chapters[0].id;
      } else {
        state.currentDeckId = null;
        state.currentChapterId = null;
      }
    }
    saveShared();
    saveProgress();
    refreshAddLocation();
    goToDeckList();
    updateMeta();
    toast('삭제됨');
  }
  function setDeckLang(deckId) {
    const deck = state.decks.find(d => d.id === deckId);
    if (!deck) return;
    const current = deck.lang || 'es-ES';
    const lang = prompt(
      '발음 언어 코드 (예: es-ES 스페인어, en-US 영어, ja-JP 일본어, fr-FR, de-DE, zh-CN, ko-KR)',
      current
    );
    if (lang === null) return;
    const t = lang.trim();
    if (!t) { toast('언어 코드를 입력해줘'); return; }
    deck.lang = t;
    save();
    renderManage();
    toast('언어 설정됨: ' + t);
  }
  function getDeckLang(deckId) {
    const d = state.decks.find(x => x.id === deckId);
    return (d && d.lang) || 'es-ES';
  }

  // ===== Chapter CRUD =====
  function createChapter(deckId) {
    const deck = state.decks.find(d => d.id === deckId);
    if (!deck) return;
    const name = prompt('새 챕터 이름');
    if (name === null) return;
    const t = name.trim();
    if (!t) { toast('이름을 입력해줘'); return; }
    if ((deck.chapters || []).some(c => c.name === t)) { toast('같은 이름의 챕터가 있어'); return; }
    const chapter = { id: 'c_' + uid(), name: t, created: Date.now() };
    if (!deck.chapters) deck.chapters = [];
    deck.chapters.push(chapter);
    save();
    refreshAddLocation();
    renderManage();
    toast('챕터 생성됨');
  }
  function renameChapter(deckId, chapterId) {
    const deck = state.decks.find(d => d.id === deckId);
    if (!deck) return;
    const chapter = (deck.chapters || []).find(c => c.id === chapterId);
    if (!chapter) return;
    const name = prompt('새 이름', chapter.name);
    if (name === null) return;
    const t = name.trim();
    if (!t) { toast('이름을 입력해줘'); return; }
    if ((deck.chapters || []).some(c => c.id !== chapterId && c.name === t)) { toast('같은 이름의 챕터가 있어'); return; }
    chapter.name = t;
    save();
    refreshAddLocation();
    renderManage();
    toast('이름 변경됨');
  }
  function deleteChapter(deckId, chapterId) {
    const deck = state.decks.find(d => d.id === deckId);
    if (!deck) return;
    if ((deck.chapters || []).length <= 1) { toast('마지막 챕터는 삭제할 수 없어'); return; }
    const chapter = (deck.chapters || []).find(c => c.id === chapterId);
    if (!chapter) return;
    const n = state.words.filter(w => w.chapterId === chapterId).length;
    const msg = n > 0
      ? `"${chapter.name}" 챕터와 그 안의 ${n}개 단어를 삭제할까? (되돌릴 수 없음)`
      : `"${chapter.name}" 챕터를 삭제할까?`;
    if (!confirm(msg)) return;
    const removedWordIds = state.words.filter(w => w.chapterId === chapterId).map(w => w.id);
    studySelectedChapters.delete(chapterId);
    deck.chapters = deck.chapters.filter(c => c.id !== chapterId);
    state.words = state.words.filter(w => w.chapterId !== chapterId);
    removedWordIds.forEach(id => delete state.progress[id]);
    if (state.currentChapterId === chapterId) {
      state.currentChapterId = deck.chapters[0].id;
    }
    saveShared();
    saveProgress();
    refreshAddLocation();
    goToChapterList(deckId);
    updateMeta();
    toast('삭제됨');
  }

  // ===== Context menu (deck or chapter) =====
  function positionMenu(menu, anchor) {
    const rect = anchor.getBoundingClientRect();
    let top = rect.bottom + 4, left = rect.left;
    const mr = menu.getBoundingClientRect();
    if (left + mr.width > window.innerWidth - 8) left = window.innerWidth - mr.width - 8;
    if (top + mr.height > window.innerHeight - 8) top = rect.top - mr.height - 4;
    menu.style.top = top + 'px';
    menu.style.left = left + 'px';
  }

  function openDeckMenu(deckId, anchor) {
    closeDeckMenu();
    const deck = state.decks.find(d => d.id === deckId);
    const currentLang = (deck && deck.lang) || 'es-ES';
    const menu = document.createElement('div');
    menu.className = 'deck-menu';
    const canDelete = state.decks.length > 1;
    menu.innerHTML = `
      <button data-action="rename">✎ 이름 변경</button>
      <button data-action="lang">🔊 언어 (${escapeHtml(currentLang)})</button>
      ${canDelete ? `<button data-action="delete" class="danger">🗑 삭제</button>` : ''}
    `;
    document.body.appendChild(menu);
    openMenu = menu;
    positionMenu(menu, anchor);
    menu.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', e => {
        e.stopPropagation();
        const action = b.dataset.action;
        closeDeckMenu();
        if (action === 'rename') renameDeck(deckId);
        else if (action === 'delete') deleteDeck(deckId);
        else if (action === 'lang') setDeckLang(deckId);
      });
    });
    setTimeout(() => document.addEventListener('click', closeDeckMenu, { once: true }), 0);
  }

  function openChapterMenu(deckId, chapterId, anchor) {
    closeDeckMenu();
    const deck = state.decks.find(d => d.id === deckId);
    if (!deck) return;
    const canDelete = (deck.chapters || []).length > 1;

    menu.className = 'deck-menu';
    menu.innerHTML = `
      <button data-action="rename">✎ 이름 변경</button>
      ${canDelete ? `<button data-action="delete" class="danger">🗑 삭제</button>` : ''}
    `;
    document.body.appendChild(menu);
    openMenu = menu;
    positionMenu(menu, anchor);
    menu.querySelectorAll('button').forEach(b => {

  function closeDeckMenu() { if (openMenu) { openMenu.remove(); openMenu = null; } }

  // ===== Move word dialog =====
  function openMoveDialog(wordId) {
    const w = state.words.find(x => x.id === wordId);

    let selDeck = w.deckId;
    let selChapter = w.chapterId;

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';

    function render() {

        <div class="modal">
          <h3>이동할 위치</h3>

            <label>단어장</label>

              <select id="moveDeck">
                ${state.decks.map(d => `<option value="${d.id}" ${d.id === selDeck ? 'selected' : ''}>${escapeHtml(d.name)}</option>`).join('')}

            </div>
          </div>
          <div class="field">
            <label>챕터</label>
            <div class="location-row">
              <select id="moveChapter">
                ${chapters.map(c => `<option value="${c.id}" ${c.id === selChapter ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('')}

        render();

      overlay.querySelector('#moveChapter').addEventListener('change', e => {
        selChapter = e.target.value;
      });
      overlay.querySelector('#moveConfirm').addEventListener('click', () => {

        w.deckId = selDeck;
        w.chapterId = selChapter;
        if (changed) save();
        overlay.remove();

        toast(changed ? '이동됨' : '변경 없음');

  // ===== Speech =====
  function speak(text, lang) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang || 'es-ES';
    speechSynthesis.speak(u);
  }

  // ===== Examples (form rows) =====
  function addExampleRow(container, initial) {
    const row = document.createElement('div');
    row.className = 'example-row';
    row.innerHTML = `
      <button class="example-remove" type="button" title="삭제">×</button>
      <div class="field">
        <label>예문</label>
        <textarea data-ex="text" placeholder="예: Levanta la cabeza y respira profundo."></textarea>
      </div>
      <div class="field">
        <label>예문 뜻 (선택)</label>
        <input type="text" data-ex="meaning" placeholder="예: 고개를 들고 깊게 숨 쉬어" autocomplete="off">
      </div>
    `;
    if (initial) {
      row.querySelector('[data-ex="text"]').value = initial.text || '';
      row.querySelector('[data-ex="meaning"]').value = initial.meaning || '';
    }
    row.querySelector('.example-remove').addEventListener('click', () => row.remove());
    container.appendChild(row);
    return row;
  }

  function readExampleRowsFrom(container) {
    const rows = container.querySelectorAll('.example-row');
    const result = [];
    rows.forEach(r => {
      const text = r.querySelector('[data-ex="text"]').value.trim();
      const meaning = r.querySelector('[data-ex="meaning"]').value.trim();
      if (text) result.push({ id: uid(), text, meaning });
    });
    return result;
  }

  // ===== Add =====
  function refreshAddLocation() {
    const ds = $('#addDeckSelect');
    if (!ds) return;
    ds.innerHTML = state.decks.map(d => `<option value="${d.id}" ${d.id === state.currentDeckId ? 'selected' : ''}>${escapeHtml(d.name)}</option>`).join('');
    refreshAddChapterOptions();
  }
  function refreshAddChapterOptions() {
    const deckId = $('#addDeckSelect').value;
    const deck = state.decks.find(d => d.id === deckId);
    const cs = $('#addChapterSelect');
    if (!cs) return;
    if (!deck) { cs.innerHTML = ''; return; }
    cs.innerHTML = (deck.chapters || []).map(c => `<option value="${c.id}" ${c.id === state.currentChapterId ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('');
    // Sanity: if no chapter matched, fall back to first
    if (cs.selectedIndex === -1 && cs.options.length > 0) {
      cs.selectedIndex = 0;
      state.currentChapterId = cs.value;
    }
  }

  function clearAddForm() {
    $('#inputTerm').value = '';
    $('#inputMeaning').value = '';
    $('#exampleList').innerHTML = '';
    $('#inputTerm').focus();
  }
  $('#btnAddExample').addEventListener('click', () => addExampleRow($('#exampleList')));

  function addWord() {
    const term = $('#inputTerm').value.trim();
    const meaning = $('#inputMeaning').value.trim();
    if (!term || !meaning) { toast('단어와 뜻을 입력해줘'); return; }
    const deckId = $('#addDeckSelect').value;
    const chapterId = $('#addChapterSelect').value;
    if (!deckId || !chapterId) { toast('저장 위치를 선택해줘'); return; }
    const examples = readExampleRowsFrom($('#exampleList'));
    const w = {
      id: uid(),
      deckId, chapterId,
      term, meaning,
      examples,
      created: Date.now(),
      correct: 0, wrong: 0
    };
    ensureWord(w);
    state.words.unshift(w);
    save();
    clearAddForm();
    updateMeta();
    toast(examples.length > 0 ? `추가됨 (예문 ${examples.length}개)` : '추가됨');
  }
  $('#btnAdd').addEventListener('click', addWord);
  $('#btnClear').addEventListener('click', clearAddForm);

  $('#inputTerm').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); $('#inputMeaning').focus(); }
  });

  $('#addDeckSelect').addEventListener('change', () => {
    state.currentDeckId = $('#addDeckSelect').value;
    const deck = state.decks.find(d => d.id === state.currentDeckId);
    state.currentChapterId = (deck && deck.chapters && deck.chapters[0]) ? deck.chapters[0].id : null;
    refreshAddChapterOptions();
    saveProgress();
  });
  $('#addChapterSelect').addEventListener('change', () => {
    state.currentChapterId = $('#addChapterSelect').value;

    else if (state.decks.length === 1) $('#meta').textContent = `${all} palabras`;

      // Preserve example IDs by text match (so we don't unnecessarily change ID on edit)
      const oldByText = {};
      (w.examples || []).forEach(e => { oldByText[e.text] = e; });
      newExamples.forEach(ne => {
        if (oldByText[ne.text]) ne.id = oldByText[ne.text].id;
      });
      w.term = term;
      w.meaning = meaning;
      w.examples = newExamples;
