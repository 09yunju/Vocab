  // ===== Study (flashcards with SRS grading) =====
  let studyState = null;
  let studyDir = 't2m';
  let studySelectedChapters = new Set();  // set of chapter IDs

  $$('#studyDirOpts .opt').forEach(o => {
    o.addEventListener('click', () => {
      $$('#studyDirOpts .opt').forEach(x => x.classList.remove('active'));
      o.classList.add('active');
      studyDir = o.dataset.dir;
    });
  });

  // ----- Tree picker helpers -----
  function deckChapterIds(deck) {
    return (deck.chapters || []).map(c => c.id);
  }
  function isDeckFullySelected(deck) {
    const ids = deckChapterIds(deck);
    return ids.length > 0 && ids.every(id => studySelectedChapters.has(id));
  }
  function isDeckPartiallySelected(deck) {
    const ids = deckChapterIds(deck);
    return ids.some(id => studySelectedChapters.has(id)) && !ids.every(id => studySelectedChapters.has(id));
  }
  function toggleDeckSelection(deck) {
    const ids = deckChapterIds(deck);
    if (isDeckFullySelected(deck)) {
      ids.forEach(id => studySelectedChapters.delete(id));
    } else {
      ids.forEach(id => studySelectedChapters.add(id));
    }
  }
  function toggleChapterSelection(chapterId) {
    if (studySelectedChapters.has(chapterId)) studySelectedChapters.delete(chapterId);
    else studySelectedChapters.add(chapterId);
  }
  function renderStudyPicker() {
    const body = $('#studyPickerBody');
    const summary = $('#studyPickerSummary');
    const rows = [];
    for (const d of state.decks) {
      const dFull = isDeckFullySelected(d);
      const dPart = isDeckPartiallySelected(d);
      const cls = dFull ? 'checked' : (dPart ? 'partial' : '');
      const icon = dFull ? '✓' : (dPart ? '−' : '');
      const chCount = (d.chapters || []).length;
      rows.push(`<div class="picker-row deck-row" data-deck-id="${d.id}">
        <span class="picker-checkbox ${cls}">${icon}</span>
        <span class="picker-row-name">${escapeHtml(d.name)}</span>
        <span class="picker-row-count">${chCount}장</span>
      </div>`);
      for (const c of (d.chapters || [])) {
        const cSel = studySelectedChapters.has(c.id);
        const cIcon = cSel ? '✓' : '';
        const cCls = cSel ? 'checked' : '';
        const wCount = state.words.filter(w => w.chapterId === c.id).length;
        rows.push(`<div class="picker-row chapter-row" data-chapter-id="${c.id}">
          <span class="picker-checkbox ${cCls}">${cIcon}</span>
          <span class="picker-row-name">${escapeHtml(c.name)}</span>
          <span class="picker-row-count">${wCount}</span>
        </div>`);
      }
    }
    body.innerHTML = rows.join('') || `<div style="padding:14px;text-align:center;color:var(--ink-faint);font-size:13px;">단어장이 없어</div>`;

    // Wire row clicks
    body.querySelectorAll('[data-deck-id]').forEach(el => {
      el.addEventListener('click', () => {
        const d = state.decks.find(x => x.id === el.dataset.deckId);
        if (!d) return;
        toggleDeckSelection(d);
        renderStudyPicker();
      });
    });
    body.querySelectorAll('[data-chapter-id]').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        toggleChapterSelection(el.dataset.chapterId);
        renderStudyPicker();
      });
    });

    // Summary count
    const wordCount = state.words.filter(w => studySelectedChapters.has(w.chapterId)).length;
    const chCount = studySelectedChapters.size;
    summary.textContent = chCount === 0 ? '선택 없음' : `${chCount}개 챕터 · ${wordCount}단어`;
  }

  // Picker header toggles expand/collapse
  $('#studyPickerHeader').addEventListener('click', () => {
    const p = $('#studyPicker');
    const body = $('#studyPickerBody');
    const isOpen = p.classList.toggle('open');
    body.style.display = isOpen ? 'block' : 'none';
  });

  function resetStudyView() {
    $('#studySetup').style.display = 'block';
    $('#studyView').style.display = 'none';
    $('#studyDone').style.display = 'none';
    studyState = null;

    // Clean up invalid chapter ids (in case deck/chapter was deleted elsewhere)
    const validChapterIds = new Set();
    state.decks.forEach(d => (d.chapters || []).forEach(c => validChapterIds.add(c.id)));
    studySelectedChapters = new Set([...studySelectedChapters].filter(id => validChapterIds.has(id)));

    // Default: select all chapters of current deck if nothing selected
    if (studySelectedChapters.size === 0) {
      const cd = state.decks.find(d => d.id === state.currentDeckId);
      if (cd) (cd.chapters || []).forEach(c => studySelectedChapters.add(c.id));
    }
    renderStudyPicker();

    // Collapse the picker by default each time
    $('#studyPicker').classList.remove('open');
    $('#studyPickerBody').style.display = 'none';
  }

  function startStudy() {
    if (studySelectedChapters.size === 0) { toast('단어장이나 챕터를 선택해줘'); return; }
    const pool = state.words.filter(w => studySelectedChapters.has(w.chapterId));
    if (pool.length === 0) { toast('선택한 곳에 단어가 없어'); return; }

    // Sort by SRS priority (most overdue first), with small jitter for variety
    const now = Date.now();
    const sorted = pool.slice();
    sorted.forEach(w => {
      const srs = getProgress(w.id).srs;
      w._priority = (now - srs.due) / DAY_MS + Math.random() * 0.3;
    });
    sorted.sort((a, b) => b._priority - a._priority);

    // Build cards with direction
    const cards = sorted.map(w => ({
      word: w,
      dir: studyDir === 'mix' ? (Math.random() < 0.5 ? 't2m' : 'm2t') : studyDir
    }));

    studyState = {
      cards,
      idx: 0,
      flipped: false,
      counts: { good: 0, hard: 0, again: 0 }
    };

    $('#studySetup').style.display = 'none';
    $('#studyView').style.display = 'block';
    $('#studyDone').style.display = 'none';
    showStudyCard();
  }

  function showStudyCard() {
    if (!studyState) return;
    const card = studyState.cards[studyState.idx];

    // Reset to front face instantly (no animation between cards)
    const inner = $('#flipCardInner');
    inner.style.transition = 'none';
    $('#flipCard').classList.remove('flipped');
    studyState.flipped = false;
    $('#studyGrades').style.display = 'none';
    $('#studyHint').style.display = 'block';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { inner.style.transition = ''; });
    });

    $('#studyProgress').textContent = `${studyState.idx + 1} / ${studyState.cards.length}`;

    const dir = card.dir || 't2m';
    const deckLang = getDeckLang(card.word.deckId);
    const w = card.word;

    const front = $('#flipFront');
    const back = $('#flipBack');

    function buildExamplesHtml(c) {
      if (!c.word.examples || c.word.examples.length === 0) return '';
      let html = '<div class="flip-back-examples">';
      for (const ex of c.word.examples) {
        html += `<div class="flip-back-example">${escapeHtml(ex.text)}<button class="speak-btn-tiny" data-speak-ex="${escapeAttr(ex.text)}" type="button">♪</button>`;
        if (ex.meaning) {
          html += `<div class="flip-back-example-meaning">${escapeHtml(ex.meaning)}</div>`;
        }
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    if (dir === 't2m') {
      front.innerHTML = `<div class="flip-side-main"></div>`;
      const fEl = front.querySelector('.flip-side-main');
      fEl.textContent = w.term;
      const sBtn = document.createElement('button');
      sBtn.className = 'speak-btn';
      sBtn.title = '발음';
      sBtn.textContent = '♪';
      sBtn.type = 'button';
      sBtn.addEventListener('click', e => { e.stopPropagation(); speak(w.term, deckLang); });
      fEl.appendChild(sBtn);
      back.innerHTML = `<div class="flip-side-main flip-side-meaning">${escapeHtml(w.meaning)}</div>` + buildExamplesHtml(card);
    } else {
      front.innerHTML = `<div class="flip-side-main flip-side-meaning">${escapeHtml(w.meaning)}</div>`;
      back.innerHTML = `<div class="flip-side-main"></div>` + buildExamplesHtml(card);
      const bEl = back.querySelector('.flip-side-main');
      bEl.textContent = w.term;
      const sBtn = document.createElement('button');
      sBtn.className = 'speak-btn';
      sBtn.title = '발음';
      sBtn.textContent = '♪';
      sBtn.type = 'button';
      sBtn.addEventListener('click', e => { e.stopPropagation(); speak(w.term, deckLang); });
      bEl.appendChild(sBtn);
    }

    back.querySelectorAll('[data-speak-ex]').forEach(b => {
      b.addEventListener('click', e => {
        e.stopPropagation();
        speak(b.dataset.speakEx, deckLang);
      });
    });

    // Render grade buttons (hidden until flipped)
    renderStudyGrades();

    requestAnimationFrame(() => requestAnimationFrame(adjustFlipHeight));
  }

  function renderStudyGrades() {
    if (!studyState) return;
    const card = studyState.cards[studyState.idx];
    const srs = getProgress(card.word.id).srs;
    const wrap = $('#studyGrades');
    wrap.innerHTML = `
      <button class="btn-grade btn-again" data-rating="again" type="button">모름<span class="interval">${previewInterval(srs, 'again')}</span></button>
      <button class="btn-grade btn-hard" data-rating="hard" type="button">애매함<span class="interval">${previewInterval(srs, 'hard')}</span></button>
      <button class="btn-grade btn-good" data-rating="good" type="button">잘 앎<span class="interval">${previewInterval(srs, 'good')}</span></button>
    `;
    wrap.querySelectorAll('[data-rating]').forEach(b => {
      b.addEventListener('click', e => {
        e.stopPropagation();
        gradeStudyCard(b.dataset.rating);
      });
    });
  }

  function adjustFlipHeight() {
    const inner = $('#flipCardInner');
    const front = $('#flipFront');
    const back = $('#flipBack');
    if (!inner || !front || !back) return;
    const w = inner.offsetWidth;
    if (w === 0) return;

    function measure(el) {
      const clone = el.cloneNode(true);
      clone.style.position = 'absolute';
      clone.style.left = '-99999px';
      clone.style.top = '0';
      clone.style.transform = 'none';
      clone.style.visibility = 'hidden';
      clone.style.width = w + 'px';
      clone.style.height = 'auto';
      document.body.appendChild(clone);
      const h = clone.offsetHeight;
      document.body.removeChild(clone);
      return h;
    }

    const fH = measure(front);
    const bH = measure(back);
    inner.style.height = Math.max(fH, bH, 280) + 'px';
  }

  function flipStudyCard() {
    if (!studyState) return;
    studyState.flipped = !studyState.flipped;
    $('#flipCard').classList.toggle('flipped', studyState.flipped);
    if (studyState.flipped) {
      $('#studyGrades').style.display = 'flex';
      $('#studyHint').style.display = 'none';
    } else {
      $('#studyGrades').style.display = 'none';
      $('#studyHint').style.display = 'block';
    }
  }

  function gradeStudyCard(rating) {
    if (!studyState || !studyState.flipped) return;
    const card = studyState.cards[studyState.idx];
    const w = state.words.find(x => x.id === card.word.id);
    if (w) {
      const p = ensureProgress(w.id);
      p.srs = updateSrs(p.srs, rating);
      if (rating === 'again') {
        p.wrong = (p.wrong || 0) + 1;
        studyState.counts.again++;
      } else {
        p.correct = (p.correct || 0) + 1;
        if (rating === 'good') studyState.counts.good++;
        else if (rating === 'hard') studyState.counts.hard++;
      }
    }
    saveProgress();

    studyState.idx++;
    if (studyState.idx >= studyState.cards.length) {
      finishStudy();
      return;
    }
    showStudyCard();
  }

  function finishStudy() {
    if (!studyState) return;
    const c = studyState.counts;
    const total = c.good + c.hard + c.again;

    $('#studyView').style.display = 'none';
    $('#studyDone').style.display = 'block';

    $('#studyBreakdown').innerHTML = `
      <div class="study-stat-row">
        <span class="study-stat-label">잘 앎</span>
        <span class="study-stat-value" style="color:var(--good);">${c.good}</span>
      </div>
      <div class="study-stat-row">
        <span class="study-stat-label">애매함</span>
        <span class="study-stat-value" style="color:var(--ochre);">${c.hard}</span>
      </div>
      <div class="study-stat-row">
        <span class="study-stat-label">모름</span>
        <span class="study-stat-value" style="color:var(--bad);">${c.again}</span>
      </div>
      <div class="study-stat-total">총 ${total}개 복습</div>
    `;

    const ratio = total > 0 ? c.good / total : 0;
    let label;
    if (total === 0) label = '시작 전이야';
    else if (ratio === 1) label = '¡Perfecto! 완벽해';
    else if (ratio >= 0.7) label = 'Muy bien · 잘했어';
    else if (ratio >= 0.4) label = 'Sigue así · 계속 가자';
    else label = 'Otra vez · 다시 한 번';
    $('#studyDoneLabel').textContent = label;

    studyState = null;
  }

  $('#btnStartStudy').addEventListener('click', startStudy);
  $('#btnStudyEnd').addEventListener('click', () => {
    if (!studyState) { resetStudyView(); return; }
    const total = studyState.counts.good + studyState.counts.hard + studyState.counts.again;
    if (total > 0) finishStudy();
    else resetStudyView();
  });
  $('#btnStudyRestart').addEventListener('click', resetStudyView);
  $('#flipCard').addEventListener('click', flipStudyCard);

  // Keyboard shortcuts (active when on study view)
  document.addEventListener('keydown', e => {
    if (!studyState) return;
    if (!$('#panel-study').classList.contains('active')) return;
    if ($('#studyView').style.display === 'none') return;
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) return;

    if (e.key === ' ') { e.preventDefault(); flipStudyCard(); }
    else if (studyState.flipped) {
      if (e.key === '1') { e.preventDefault(); gradeStudyCard('again'); }
      else if (e.key === '2') { e.preventDefault(); gradeStudyCard('hard'); }
      else if (e.key === '3') { e.preventDefault(); gradeStudyCard('good'); }
    }
  });

  // ===== Export / Import =====
  $('#btnExport').addEventListener('click', () => {
    const data = JSON.stringify({
      version: 4,
      decks: state.decks,
      words: state.words,
      exported: new Date().toISOString()
    }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `vocab-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('내보냄');
  });

  $('#btnImport').addEventListener('click', () => $('#fileInput').click());
  $('#fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const migrated = migrateData(parsed);
        if (!migrated) throw new Error('빈 데이터');

        // Merge: add decks by name, then chapters by name within each deck, then words by (deck, chapter, term)
        const deckIdMap = {};
        const chapterIdMap = {};
        (migrated.decks || []).forEach(d => {
          let existing = state.decks.find(x => x.name === d.name);
          if (!existing) {
            existing = {
              id: 'd_' + uid(),
              name: d.name,
              created: d.created || Date.now(),
              chapters: []
            };
            if (d.lang) existing.lang = d.lang;
            state.decks.push(existing);
          }
          deckIdMap[d.id] = existing.id;
          // Merge chapters
          if (!existing.chapters) existing.chapters = [];
          (d.chapters || []).forEach(c => {
            let exCh = existing.chapters.find(x => x.name === c.name);
            if (!exCh) {
              exCh = { id: 'c_' + uid(), name: c.name, created: c.created || Date.now() };
              existing.chapters.push(exCh);
            }
            chapterIdMap[c.id] = exCh.id;
          });
          // Ensure at least one chapter
          if (existing.chapters.length === 0) {
            existing.chapters.push({ id: defaultChapterIdFor(existing.id), name: '기본', created: Date.now() });
          }
        });
        const existingKeys = new Set(state.words.map(w => `${w.deckId}::${w.term.toLowerCase()}`));
        let added = 0;
        let progressImported = 0;
        for (const w of (migrated.words || [])) {
          const newDeckId = deckIdMap[w.deckId] || state.currentDeckId;
          const targetDeck = state.decks.find(d => d.id === newDeckId);
          if (!targetDeck) continue;
          const newChapterId = chapterIdMap[w.chapterId] ||
            (targetDeck.chapters && targetDeck.chapters[0] ? targetDeck.chapters[0].id : null);
          const key = `${newDeckId}::${w.term.toLowerCase()}`;
          if (existingKeys.has(key)) continue;
          existingKeys.add(key);
          const nw = {
            id: uid(),
            deckId: newDeckId,
            chapterId: newChapterId,
            term: w.term, meaning: w.meaning,
            examples: Array.isArray(w.examples) ? w.examples.map(e => ({
              id: uid(), text: e.text, meaning: e.meaning || ''
            })) : [],
            created: w.created || Date.now()
          };
          ensureWord(nw);
          state.words.unshift(nw);
          added++;
          // Per-user fields from the imported file go into MY progress (current logged-in user)
          if (w.srs || (w.correct && w.correct > 0) || (w.wrong && w.wrong > 0)) {
            state.progress[nw.id] = {
              srs: w.srs || defaultSrs(),
              correct: w.correct || 0,
              wrong: w.wrong || 0
            };
            progressImported++;
          }
        }
        saveShared();
        if (progressImported > 0) saveProgress();
        refreshAddLocation();
        renderManage();
        updateMeta();
        toast(progressImported > 0 ? `${added}개 추가됨 (내 진도 ${progressImported}개 포함)` : `${added}개 추가됨`);
      } catch (err) {
        console.error('Import failed');
        toast('파일을 읽을 수 없어');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  $('#btnReset').addEventListener('click', () => {
    if (Object.keys(state.progress).length === 0) { toast('초기화할 공부 기록이 없어'); return; }
    if (confirm('내 공부 기록 (SRS · 정답/오답 카운트)을 모두 초기화할까? 공유 단어장 콘텐츠는 그대로 유지돼.')) {
      state.progress = {};
      saveProgress();
      renderManage();
      updateMeta();
      toast('내 공부 기록 초기화됨');
    }
  });

  // ===== Settings (account) modal wiring =====
  $('#btnSettings').addEventListener('click', showSettings);
  $('#btnSettingsClose').addEventListener('click', hideSettings);
  $('#btnSaveUsername').addEventListener('click', changeUsername);
  $('#btnSavePassword').addEventListener('click', changePassword);
  $('#btnSaveDeckPassword').addEventListener('click', changeDeckPassword);
  $('#settingsOverlay').addEventListener('click', e => {
    if (e.target === $('#settingsOverlay')) hideSettings();
  });
  $('#newUsername').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); changeUsername(); }
  });
  $('#newPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); changePassword(); }
  });
  $('#newDeckPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); changeDeckPassword(); }
  });

  // ===== Init =====
  // Deliberately do NOT load() from localStorage here — wait until after auth + deck gate.
  // This prevents cached content from being visible (via DevTools) before the gate.
  updateMeta();

  $('#btnSignin').addEventListener('click', handleSignin);
  $('#btnSignup').addEventListener('click', handleSignup);
  $('#btnLogout').addEventListener('click', handleLogout);
  $('#authPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); handleSignin(); }
  });
  $('#authUsername').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); $('#authPassword').focus(); }
  });

  // Skip background sync pulls while user is typing in an input or textarea —
  // a pull may trigger rerenderAfterSync which can disrupt the input focus
  // (and dismiss the mobile keyboard).
  function isUserTyping() {
    const a = document.activeElement;
    if (!a) return false;
    const tag = a.tagName;
    return tag === 'INPUT' || tag === 'TEXTAREA';
  }

  window.addEventListener('focus', () => {
    if (currentUser && hasSessionDeckAccess() && !isUserTyping()) syncPull();
  });
  window.addEventListener('resize', () => {
    if (studyState && $('#panel-study').classList.contains('active')) adjustFlipHeight();
  });
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && currentUser && hasSessionDeckAccess() && !isUserTyping()) syncPull();
  });
  window.addEventListener('online', () => {
    if (currentUser && hasSessionDeckAccess()) { pushShared(); pushProgress(); }
  });
  window.addEventListener('offline', () => setSyncStatus('offline'));

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session && session.user) {
      currentUser = session.user;
      await onAuthenticated();
      $('#inputTerm').focus();
    } else {
      setSyncStatus('offline');
      showAuthOverlay();
      $('#authUsername').focus();
    }
  })();

  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT') {
      currentUser = null;
      setSyncStatus('offline');
      showAuthOverlay();
    } else if (event === 'SIGNED_IN' && session && !currentUser) {
      currentUser = session.user;
      hideAuthOverlay();
      onAuthenticated();
    }
  });
</script>
</body>
</html>
