<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Vocabulario.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,800;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    /* Olive grove + soft ivory palette */
    --paper:      #fcfaf6;   /* very subtle ivory, near white */
    --paper-2:    #f2eee2;   /* light cream for cards (visible against ivory) */
    --paper-soft: #ffffff;   /* pure white for focused inputs */
    --ink:        #3a2114;   /* deep warm brown */
    --ink-soft:   #5e3a26;   /* medium brown */
    --ink-faint:  #a08066;   /* faded brown */
    --rule:       #e2dac8;   /* light sand for borders */
    --rule-soft:  #ebe5d6;   /* lighter sand */
    --accent:     #5d7437;   /* olive green, primary accent */
    --accent-2:   #a3a849;   /* light olive */
    --ochre:      #d99d2b;   /* saffron / Andalusian gold */
    --good:       #3d5a3d;   /* forest green for correct */
    --olive:      #8a8748;   /* muted olive */
    --bad:        #8a3a3a;   /* deep wine, only for wrong/error */

    --shadow: 0 1px 0 rgba(58, 33, 20, 0.04), 0 14px 42px -12px rgba(58, 33, 20, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    background-image: none;
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 36px 24px 80px;
  }

  /* ===== Header ===== */
  header {
    border-bottom: 1px solid var(--rule);
    padding-bottom: 22px;
    margin-bottom: 18px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  h1 {
    font-family: 'Playfair Display', 'Fraunces', 'Noto Sans KR', sans-serif;
    font-weight: 800;
    font-size: 44px;
    letter-spacing: -0.015em;
    line-height: 1;
    color: var(--ink);
  }

  h1 .dot { color: var(--accent); }

  .meta {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faint);
  }

  /* ===== Deck pills ===== */
  .deck-bar {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 6px 0 16px;
    margin-bottom: 16px;
    border-bottom: 1px dashed var(--rule);
    -webkit-overflow-scrolling: touch;
  }
  .deck-bar::-webkit-scrollbar { height: 4px; }
  .deck-bar::-webkit-scrollbar-track { background: transparent; }
  .deck-bar::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

  .deck-pill {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .deck-pill:hover { color: var(--ink); border-color: var(--ink-soft); }
  .deck-pill.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .deck-pill.add {
    color: var(--ink-faint);
    border-style: dashed;
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
  }
  .deck-pill .deck-count {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 11px;
    opacity: 0.7;
  }
  .deck-pill.active .deck-count { color: var(--paper); opacity: 0.7; }

  .deck-menu {
    position: fixed;
    background: var(--paper);
    border: 1px solid var(--ink-soft);
    border-radius: 3px;
    box-shadow: 0 12px 32px rgba(58, 33, 20, 0.22);
    padding: 4px;
    z-index: 100;
    min-width: 160px;
    animation: menuIn 0.12s ease;
  }
  @keyframes menuIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .deck-menu button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 9px 14px;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.1s;
  }
  .deck-menu button:hover { background: var(--paper-2); color: var(--ink); }
  .deck-menu button.danger:hover { color: var(--bad); }

  /* ===== Tabs ===== */
  nav.tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 30px;
    border-bottom: 1px solid var(--rule);
  }

  .tab {
    background: none;
    border: none;
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 16px;
    color: var(--ink-faint);
    cursor: pointer;
    position: relative;
    transition: color 0.15s;
    letter-spacing: 0.02em;
  }
  .tab:hover { color: var(--ink-soft); }
  .tab.active { color: var(--ink); }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
  }
  .tab .count {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-faint);
    margin-left: 4px;
  }

  /* ===== Panels ===== */
  .panel { display: none; animation: fade 0.25s ease; }
  .panel.active { display: block; }
  @keyframes fade {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== Forms ===== */
  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  input[type="text"], textarea {
    width: 100%;
    background: var(--paper-2);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 12px 14px;
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    font-size: 16px;
    color: var(--ink);
    transition: border-color 0.15s, background 0.15s;
  }
  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--ink-soft);
    background: var(--paper-soft);
  }

  textarea { resize: vertical; min-height: 60px; font-family: inherit; }

  /* Buttons */
  .btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 12px 22px;
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    border-radius: 2px;
    transition: transform 0.1s, background 0.15s;
  }
  .btn:hover { background: var(--accent); }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:disabled:hover { background: var(--ink); }

  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--rule);
  }
  .btn-ghost:hover { background: var(--paper-2); color: var(--ink); }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  .add-context {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faint);
    margin-bottom: 16px;
  }
  .add-context strong {
    font-weight: 500;
    color: var(--ink-soft);
  }

  /* ===== Section divider with ornament ===== */
  .section-divider {
    margin: 24px 0 14px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--rule);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .section-divider .title {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .section-divider .ornament {
    color: var(--accent-2);
    font-size: 11px;
    flex: 1;
    text-align: center;
    letter-spacing: 0.4em;
    opacity: 0.6;
  }
  .section-divider .hint {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-faint);
  }

  /* Example rows in form */
  .example-row {
    background: var(--paper-2);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--ochre);
    border-radius: 2px;
    padding: 14px 14px 8px;
    margin-bottom: 8px;
    position: relative;
  }
  .example-row .field { margin-bottom: 10px; }
  .example-row label {
    font-size: 11px;
    margin-bottom: 4px;
  }
  .example-row input, .example-row textarea {
    background: var(--paper-soft);
    font-size: 14px;
    padding: 8px 10px;
  }
  .example-row textarea { min-height: 38px; }
  .example-remove {
    position: absolute;
    top: 6px;
    right: 6px;
    background: none;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 18px;
    padding: 2px 8px;
    border-radius: 2px;
    line-height: 1;
  }
  .example-remove:hover { color: var(--bad); }

  .add-row-btn {
    background: transparent;
    border: 1px dashed var(--rule);
    color: var(--ink-faint);
    padding: 12px;
    width: 100%;
    cursor: pointer;
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 13px;
    border-radius: 2px;
    margin-bottom: 18px;
    transition: all 0.15s;
  }
  .add-row-btn:hover { color: var(--ink); border-color: var(--ink-soft); }

  /* ===== Word list ===== */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    align-items: center;
  }
  .toolbar input { flex: 1; }

  .word-list { list-style: none; }

  .word-item {
    padding: 18px 0;
    border-bottom: 1px solid var(--rule);
  }
  .word-head {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px 16px;
    align-items: start;
  }

  .word-term {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
    word-break: keep-all;
  }
  .word-meaning {
    font-size: 15px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  .word-actions {
    text-align: right;
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-faint);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .word-actions .stats { white-space: nowrap; }
  .word-actions button {
    background: none;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 14px;
    padding: 4px 6px;
    border-radius: 2px;
    transition: color 0.15s, background 0.15s;
  }
  .word-actions button:hover { color: var(--ink); background: var(--paper-2); }
  .word-actions button.danger:hover { color: var(--bad); }

  .word-examples {
    margin-top: 10px;
    padding-left: 14px;
    border-left: 2px solid var(--rule);
  }
  .word-example {
    padding: 6px 0;
  }
  .word-example:not(:last-child) {
    border-bottom: 1px dotted var(--rule);
  }
  .word-example-text {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .word-example-meaning {
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 1px;
    padding-left: 12px;
    border-left: 2px solid var(--paper-2);
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 16px;
  }
  .empty .ornament {
    display: block;
    color: var(--accent-2);
    font-size: 14px;
    letter-spacing: 0.5em;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  /* ===== Quiz ===== */
  .quiz-setup {
    background: var(--paper-2);
    border: 1px solid var(--rule);
    padding: 24px;
    border-radius: 2px;
    margin-bottom: 20px;
  }
  .quiz-setup h3 {
    font-family: 'Playfair Display', 'Fraunces', 'Noto Sans KR', sans-serif;
    font-weight: 500;
    font-size: 22px;
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }

  .opt-row {
    display: flex;
    gap: 8px;
    margin-bottom: 0;
    flex-wrap: wrap;
  }
  .opt {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
    border-radius: 2px;
    color: var(--ink-soft);
    font-family: inherit;
    transition: all 0.15s;
  }
  .opt:hover { border-color: var(--ink-soft); }
  .opt.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .quiz-deck-count {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 11px;
    opacity: 0.65;
    margin-left: 4px;
  }

  .quiz-card {
    background: var(--paper-2);
    border: 1px solid var(--rule);
    padding: 48px 28px;
    border-radius: 2px;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .quiz-card::before {
    content: '';
    position: absolute;
    top: 16px; left: 16px; right: 16px; bottom: 16px;
    border: 1px solid var(--rule);
    pointer-events: none;
    border-radius: 1px;
  }

  .quiz-progress {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faint);
    margin-bottom: 4px;
    position: relative;
    z-index: 1;
  }
  .quiz-kind {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 18px;
    position: relative;
    z-index: 1;
  }

  .quiz-question {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-size: 38px;
    font-weight: 500;
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
    word-break: keep-all;
  }
  .quiz-question.is-sentence {
    font-size: 24px;
    line-height: 1.5;
  }

  .quiz-hint {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faint);
    position: relative;
    z-index: 1;
  }

  .quiz-answer {
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px dashed var(--rule);
    font-size: 22px;
    color: var(--ink-soft);
    font-weight: 500;
    position: relative;
    z-index: 1;
    animation: fade 0.3s ease;
  }
  .quiz-answer .note {
    display: block;
    margin-top: 8px;
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-faint);
    font-weight: 400;
  }

  .quiz-controls {
    display: flex;
    gap: 8px;
    margin-top: 24px;
    justify-content: center;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  /* SRS 4-grade buttons */
  .grade-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: nowrap;
    width: 100%;
  }
  .btn-grade {
    flex: 1 1 0;
    min-width: 0;
    padding: 10px 6px;
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--paper);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: transform 0.1s, filter 0.15s;
  }
  .btn-grade:hover { filter: brightness(1.08); }
  .btn-grade:active { transform: translateY(1px); }
  .btn-grade .interval {
    font-size: 10px;
    font-weight: 400;
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    opacity: 0.8;
  }
  .btn-again { background: var(--bad); }
  .btn-hard { background: var(--accent-2); }
  .btn-grade.btn-good { background: var(--good); color: var(--paper); }
  .btn-easy { background: var(--olive); }

  /* Speak buttons */
  .speak-btn {
    background: none;
    border: 1px solid var(--rule);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    color: var(--ink-faint);
    margin-left: 6px;
    vertical-align: middle;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
  }
  .speak-btn:hover {
    background: var(--paper-soft);
    color: var(--accent);
    border-color: var(--accent);
  }

  .speak-btn-tiny {
    background: none;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 11px;
    padding: 1px 4px;
    margin-left: 4px;
    vertical-align: baseline;
    transition: color 0.15s;
    line-height: 1;
  }
  .speak-btn-tiny:hover { color: var(--accent); }

  /* Blank quiz visuals */
  .blank-mark {
    display: inline-block;
    min-width: 70px;
    padding: 0 6px;
    margin: 0 2px;
    border-bottom: 2px solid var(--accent);
    color: transparent;
    user-select: none;
    font-weight: 700;
  }
  .blank-filled {
    font-weight: 700;
    padding: 0 4px;
    border-bottom: 2px solid;
  }
  .blank-filled.correct { color: var(--good); border-color: var(--good); }
  .blank-filled.wrong { color: var(--bad); border-color: var(--bad); }

  .quiz-blank-input-row {
    margin-top: 24px;
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }
  .quiz-blank-input-row input {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-size: 20px;
    padding: 10px 16px;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 2px;
    text-align: center;
    width: auto;
    max-width: 240px;
  }
  .quiz-blank-input-row input:focus {
    outline: none;
    border-color: var(--ink);
    background: var(--paper-soft);
  }

  .quiz-feedback {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-weight: 500;
    display: inline;
  }
  .quiz-feedback.correct { color: var(--good); }
  .quiz-feedback.wrong { color: var(--ink-soft); }
  .quiz-feedback .user-ans {
    text-decoration: line-through;
    color: var(--bad);
    margin-right: 6px;
  }
  .quiz-feedback .arrow {
    margin: 0 6px;
    color: var(--ink-faint);
    font-style: italic;
  }
  .quiz-feedback .correct-ans { color: var(--good); }

  /* Result */
  .result {
    text-align: center;
    padding: 40px 20px;
  }
  .result-ornament {
    color: var(--accent-2);
    letter-spacing: 0.5em;
    font-size: 14px;
    opacity: 0.5;
    margin-bottom: 20px;
  }
  .result-score {
    font-family: 'Playfair Display', 'Fraunces', 'Noto Sans KR', sans-serif;
    font-size: 64px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-score .slash { color: var(--ink-faint); margin: 0 4px; font-weight: 400; }
  .result-label {
    font-family: 'Fraunces', 'Noto Sans KR', sans-serif;
    font-style: italic;
    color: var(--ink-faint);
    margin-bottom: 32px;
    font-size: 15px;
  }

  .result-missed {
    text-align: left;
    margin-top: 24px;
    border-top: 1px solid var(--rule);
    padding-top: 20px;
  }
  .result-missed h4 {

<script>
  // ===== Supabase config =====
  const SUPABASE_URL = 'https://fvhnuuickbagzxsulpxl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_W9YN6x8P7DuetlY8UY8Ghw_11F-1hAQ';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      storage: window.localStorage,
      storageKey: 'vocab.auth'
    }
  });

  let currentUser = null;

  const STORAGE_KEY = 'vocab.v2'; // continue using same key; data shape includes a version field
  const OLD_KEY = 'vocab.v1';

  let state = {
    decks: [],
    currentDeckId: null,
    words: [],
    quiz: null,
    lastSyncedAt: 0
  };

  let quizSelectedDecks = new Set();

  // ===== Helpers =====
  function $(s) { return document.querySelector(s); }
  function $$(s) { return document.querySelectorAll(s); }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }
  function escapeRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function toast(msg) {
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove('show'), 1800);
  }

  function getCurrentDeck() {
    return state.decks.find(d => d.id === state.currentDeckId);
  }
  function wordsInDeck(deckId) {
    return state.words.filter(w => w.deckId === deckId);
  }

  // ===== SRS =====
  const DAY_MS = 86400000;
  function defaultSrs() {
    return { due: 0, interval: 0, ease: 2.5, reps: 0, lapses: 0 };
  }
  function ensureSrs(obj, key) {
    if (!obj[key] || typeof obj[key].due !== 'number') obj[key] = defaultSrs();
  }
  function ensureWord(w) {
    if (!Array.isArray(w.examples)) w.examples = [];
    ensureSrs(w, 'srs');
    ensureSrs(w, 'srsBlank');
  }

  function updateSrs(srs, rating) {
    const now = Date.now();
    let { interval, ease, reps, lapses } = srs;
    let dueMs;
    const isNew = reps === 0;

    if (rating === 'again') {
      if (reps > 0) lapses += 1;
      interval = 0;
      reps = 0;
      ease = Math.max(1.3, ease - 0.2);
      dueMs = now + 60000;
    } else if (rating === 'hard') {
      if (isNew) {
        interval = 0;
        dueMs = now + 6 * 60000;
      } else {
        interval = Math.max(Math.round(interval * 1.2), interval + 1);
        dueMs = now + interval * DAY_MS;
        reps += 1;
      }
      ease = Math.max(1.3, ease - 0.15);
    } else if (rating === 'good') {
      if (isNew) { interval = 1; reps = 1; }
      else { interval = Math.max(1, Math.round(interval * ease)); reps += 1; }
      dueMs = now + interval * DAY_MS;
    } else if (rating === 'easy') {
      if (isNew) { interval = 4; reps = 1; }
      else { interval = Math.max(1, Math.round(interval * ease * 1.3)); reps += 1; }
      ease = Math.min(3.0, ease + 0.15);
      dueMs = now + interval * DAY_MS;
    }
    return { due: dueMs, interval, ease, reps, lapses };
  }

  function formatTime(ms) {
    if (ms < 0) ms = 0;
    const min = ms / 60000;
    if (min < 60) return Math.max(1, Math.round(min)) + '분';
    const hr = ms / 3600000;
    if (hr < 24) return Math.round(hr) + '시간';
    const day = ms / 86400000;
    if (day < 30) return Math.round(day) + '일';
    if (day < 365) return Math.round(day / 30) + '달';
    return (day / 365).toFixed(1) + '년';
  }
  function previewInterval(srs, rating) {
    const ns = updateSrs(srs, rating);
    return formatTime(ns.due - Date.now());
  }

  function getCardSrs(card) {
    if (card.kind === 'term') return card.word.srs;
    if (card.kind === 'blank') return card.word.srsBlank;
  }
  function setCardSrs(card, ns) {
    if (card.kind === 'term') card.word.srs = ns;
    else if (card.kind === 'blank') card.word.srsBlank = ns;
  }

  // ===== Storage / Migration =====
  function save() {
    saveLocal();
    if (currentUser) queuePush();
  }

  function saveLocal() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      version: 3,
      decks: state.decks,
      currentDeckId: state.currentDeckId,
      words: state.words,
      lastSyncedAt: state.lastSyncedAt || 0
    }));
    updateMeta();
  }

  // Migrate any old shape into the new flat shape: {decks, currentDeckId, words[]}
  // where each word: {id, deckId, term, meaning, examples[{id,text,meaning}], srs, srsBlank, correct, wrong, created}
  function migrateData(raw) {
    if (!raw) return null;

    // v1: flat array of words (no decks). Build a "기본" deck.
    if (Array.isArray(raw)) {
      const def = { id: 'd_' + uid(), name: '기본', created: Date.now() };
      const words = raw.map(w => {
        const nw = {
          id: w.id || uid(),
          deckId: def.id,
          term: w.term, meaning: w.meaning,
          examples: w.note ? [{ id: uid(), text: w.note, meaning: '' }] : [],
          created: w.created || Date.now(),
          correct: w.correct || 0,
          wrong: w.wrong || 0
        };
        ensureWord(nw);
        return nw;
      });
      return { decks: [def], currentDeckId: def.id, words, lastSyncedAt: 0 };
    }

    // Detect format. v3 (current) has version=3 OR words have 'examples' but no 'expressions'.
    // v2 has words with 'expressions' nested.
    const sample = (raw.words || [])[0];
    const isV3 = raw.version === 3 || (sample && Array.isArray(sample.examples) && !('expressions' in sample));
    if (isV3) {
      // Just ensure SRS etc
      (raw.words || []).forEach(ensureWord);
      return raw;
    }

    // v2 → v3: flatten expressions into separate top-level words
    const newWords = [];
    for (const w of (raw.words || [])) {
      // Headword as a flat word
      const head = {
        id: w.id || uid(),
        deckId: w.deckId,
        term: w.term,
        meaning: w.meaning,
        examples: [],
        created: w.created || Date.now(),
        correct: w.correct || 0,
        wrong: w.wrong || 0
      };
      if (w.srs) head.srs = w.srs;
      ensureWord(head);
      newWords.push(head);

      // Each expression becomes its own word
      for (const e of (w.expressions || [])) {
        const ew = {
          id: e.id || uid(),
          deckId: w.deckId,
          term: e.phrase,
          meaning: e.meaning,
          examples: e.example ? [{ id: uid(), text: e.example, meaning: e.exampleMeaning || '' }] : [],
          created: w.created || Date.now(),
          correct: e.correct || 0,
          wrong: e.wrong || 0
        };
        if (e.srs) ew.srs = e.srs;
        if (e.srsBlank) ew.srsBlank = e.srsBlank;
        ensureWord(ew);
        newWords.push(ew);
      }
    }
    return {
      version: 3,
      decks: raw.decks || [],
      currentDeckId: raw.currentDeckId,
      words: newWords,
      lastSyncedAt: raw.lastSyncedAt || 0
    };
  }

  function load() {
    try {
      const v2raw = localStorage.getItem(STORAGE_KEY);
      if (v2raw) {
        const data = migrateData(JSON.parse(v2raw));
        if (data) applyData(data);
        if (data && data.version !== 3) saveLocal(); // persist migration
        ensureValidDeckState();
        return;
      }
      const v1raw = localStorage.getItem(OLD_KEY);
      if (v1raw) {
        const data = migrateData(JSON.parse(v1raw));
        if (data) {
          applyData(data);
          saveLocal();
        }
        ensureValidDeckState();
        return;
      }
      ensureValidDeckState();
    } catch (e) {
      console.error('Load failed:', e);
      ensureValidDeckState();
    }
  }

  function applyData(data) {
    state.decks = Array.isArray(data.decks) ? data.decks : [];
    state.currentDeckId = data.currentDeckId;
    state.words = Array.isArray(data.words) ? data.words : [];
    state.lastSyncedAt = data.lastSyncedAt || 0;
    state.words.forEach(ensureWord);
  }

  function ensureValidDeckState() {
    if (!state.decks || state.decks.length === 0) {
      const def = { id: 'd_' + uid(), name: '기본', created: Date.now() };
      state.decks = [def];
      state.currentDeckId = def.id;
    }
    if (!state.currentDeckId || !state.decks.find(d => d.id === state.currentDeckId)) {
      state.currentDeckId = state.decks[0].id;
    }
  }

  // ===== Cloud sync =====
  let pushTimer = null;
  let isSyncing = false;

  function setSyncStatus(status) {
    const el = $('#syncStatus');
    if (!el) return;
    el.classList.remove('synced', 'syncing', 'offline', 'error');
    el.classList.add(status);
    const labels = { synced: '동기화 됨', syncing: '동기화 중...', offline: '오프라인', error: '동기화 오류' };
    el.textContent = labels[status] || '';
  }

  async function syncPull() {
    if (!currentUser || isSyncing) return;
    if (state.quiz || studyState) return;
    if (!navigator.onLine) { setSyncStatus('offline'); return; }
    isSyncing = true;
    setSyncStatus('syncing');
    try {
      const { data, error } = await sb
        .from('user_data')
        .select('data, updated_at')
        .eq('user_id', currentUser.id)
        .maybeSingle();
      if (error) throw error;

      if (!data) {
        await syncPush(true);
        return;
      }

      const serverTime = new Date(data.updated_at).getTime();
      if (serverTime > (state.lastSyncedAt || 0)) {
        // Server is newer; migrate as needed and replace local
        const migrated = migrateData(data.data || {});
        if (migrated) {
          applyData(migrated);
          state.lastSyncedAt = serverTime;
          ensureValidDeckState();
          saveLocal();
          rerenderAfterSync();
          // If it was old format we just migrated, push v3 back up
          if (data.data && data.data.version !== 3) {
            queuePush();
          }
        }
      }
      setSyncStatus('synced');
    } catch (e) {
      console.error('Pull error:', e);
      setSyncStatus('error');
    } finally {
      isSyncing = false;
    }
  }

  async function syncPush(silent) {
    if (!currentUser) return;
    if (!navigator.onLine) { setSyncStatus('offline'); return; }
    if (!silent) setSyncStatus('syncing');
    try {
      const { data, error } = await sb
        .from('user_data')
        .upsert({
          user_id: currentUser.id,
          data: {
            version: 3,
            decks: state.decks,
            currentDeckId: state.currentDeckId,
            words: state.words
          }
        }, { onConflict: 'user_id' })
        .select('updated_at')
        .single();
      if (error) throw error;
      state.lastSyncedAt = data ? new Date(data.updated_at).getTime() : Date.now();
      saveLocal();
      setSyncStatus('synced');
    } catch (e) {
      console.error('Push error:', e);
      setSyncStatus('error');
    }
  }

  function queuePush() {
    clearTimeout(pushTimer);
    setSyncStatus('syncing');
    pushTimer = setTimeout(() => syncPush(), 1500);
  }

  function rerenderAfterSync() {
    renderDeckBar();
    updateMeta();
    if ($('#panel-list').classList.contains('active')) renderList();
    if ($('#panel-study').classList.contains('active')) resetStudyView();
    if ($('#panel-quiz').classList.contains('active')) resetQuizView();
  }

  // ===== Auth =====
  function showAuthOverlay() {
    $('#authOverlay').style.display = 'flex';
    $('#authError').textContent = '';
    $('#authEmail').value = '';
    $('#authPassword').value = '';
  }
  function hideAuthOverlay() { $('#authOverlay').style.display = 'none'; }

  async function handleSignin() {
    const email = $('#authEmail').value.trim();
    const password = $('#authPassword').value;
    if (!email || !password) { $('#authError').textContent = '이메일과 비밀번호를 입력해줘'; return; }
    $('#authError').textContent = '';
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { $('#authError').textContent = '로그인 실패: ' + error.message; return; }
    currentUser = data.user;
    hideAuthOverlay();
    await onAuthenticated();
  }

  async function handleSignup() {
    const email = $('#authEmail').value.trim();
    const password = $('#authPassword').value;
    if (!email || !password) { $('#authError').textContent = '이메일과 비밀번호를 입력해줘'; return; }
    if (password.length < 6) { $('#authError').textContent = '비밀번호는 6자 이상'; return; }
    $('#authError').textContent = '';
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) { $('#authError').textContent = '회원가입 실패: ' + error.message; return; }
    if (data.session) {
      currentUser = data.user;
      hideAuthOverlay();
      await onAuthenticated();
    } else {
      $('#authError').textContent = '이메일 확인 링크를 보냈어. 확인 후 로그인해.';
    }
  }

  async function handleLogout() {
    if (!confirm('로그아웃할까? 로컬 데이터는 남아있어.')) return;
    clearTimeout(pushTimer);
    await syncPush(true);
    await sb.auth.signOut();
    currentUser = null;
    setSyncStatus('offline');
    showAuthOverlay();
  }

  async function onAuthenticated() {
    await syncPull();
    rerenderAfterSync();
  }

  // ===== Tabs =====
  function switchTab(name) {
    $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    $$('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
    if (name === 'list') renderList();
    if (name === 'study') resetStudyView();

  }
  $$('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

  // ===== Decks =====
  function renderDeckBar() {
    const bar = $('#deckBar');
    const pills = state.decks.map(d => {
      const isActive = d.id === state.currentDeckId;
      const n = wordsInDeck(d.id).length;
      return `<button class="deck-pill ${isActive ? 'active' : ''}" data-deck="${d.id}">
        <span>${escapeHtml(d.name)}</span>
        <span class="deck-count">${n}</span>
      </button>`;
    }).join('');
    bar.innerHTML = pills + `<button class="deck-pill add" id="btnNewDeck">+ 새 단어장</button>`;
    bar.querySelectorAll('[data-deck]').forEach(b => {
      b.addEventListener('click', () => {
        const id = b.dataset.deck;
        if (id === state.currentDeckId) openDeckMenu(id, b);
        else switchDeck(id);
      });
    });
    $('#btnNewDeck').addEventListener('click', createDeck);
  }

  function switchDeck(deckId) {
    state.currentDeckId = deckId;
    save();
    renderDeckBar();
    renderList();
    updateMeta();
  }
  function createDeck() {
    const name = prompt('새 단어장 이름');
    if (name === null) return;
    const t = name.trim();
    if (!t) { toast('이름을 입력해줘'); return; }
    if (state.decks.some(d => d.name === t)) { toast('같은 이름의 단어장이 있어'); return; }
    const deck = { id: 'd_' + uid(), name: t, created: Date.now() };
    state.decks.push(deck);
    state.currentDeckId = deck.id;
    save();
    renderDeckBar();
    renderList();
    updateMeta();
    toast('단어장 생성됨');
  }
  function renameDeck(deckId) {
    const deck = state.decks.find(d => d.id === deckId);
    if (!deck) return;
    const name = prompt('새 이름', deck.name);
    if (name === null) return;
    const t = name.trim();
    if (!t) { toast('이름을 입력해줘'); return; }
    if (state.decks.some(d => d.id !== deckId && d.name === t)) { toast('같은 이름의 단어장이 있어'); return; }
    deck.name = t;
    save();
    renderDeckBar();
    updateMeta();
    toast('이름 변경됨');
  }
  function deleteDeck(deckId) {
    if (state.decks.length <= 1) { toast('마지막 단어장은 삭제할 수 없어'); return; }
    const deck = state.decks.find(d => d.id === deckId);
    if (!deck) return;
    const n = wordsInDeck(deckId).length;
    const msg = n > 0
      ? `"${deck.name}" 단어장과 그 안의 ${n}개 단어를 삭제할까? (되돌릴 수 없음)`
      : `"${deck.name}" 단어장을 삭제할까?`;
    if (!confirm(msg)) return;
    state.decks = state.decks.filter(d => d.id !== deckId);
    state.words = state.words.filter(w => w.deckId !== deckId);
    quizSelectedDecks.delete(deckId);
    if (state.currentDeckId === deckId) state.currentDeckId = state.decks[0].id;
    save();
    renderDeckBar();
    renderList();
    updateMeta();
    toast('삭제됨');
  }

  let openMenu = null;
  function openDeckMenu(deckId, anchor) {
    closeDeckMenu();
    const deck = state.decks.find(d => d.id === deckId);
    const currentLang = (deck && deck.lang) || 'es-ES';
    const menu = document.createElement('div');
    menu.className = 'deck-menu';
    const canDelete = state.decks.length > 1;
    menu.innerHTML = `
      <button data-action="rename">✎ 이름 변경</button>
      <button data-action="lang">🔊 언어 (${escapeHtml(currentLang)})</button>
      ${canDelete ? `<button data-action="delete" class="danger">🗑 삭제</button>` : ''}
    `;
    document.body.appendChild(menu);
    openMenu = menu;
    const rect = anchor.getBoundingClientRect();
    let top = rect.bottom + 4, left = rect.left;
    const mr = menu.getBoundingClientRect();
    if (left + mr.width > window.innerWidth - 8) left = window.innerWidth - mr.width - 8;
    if (top + mr.height > window.innerHeight - 8) top = rect.top - mr.height - 4;
    menu.style.top = top + 'px';
    menu.style.left = left + 'px';
    menu.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', e => {
        e.stopPropagation();
        const action = b.dataset.action;
        closeDeckMenu();
        if (action === 'rename') renameDeck(deckId);
        else if (action === 'delete') deleteDeck(deckId);
        else if (action === 'lang') setDeckLang(deckId);
      });
    });
    setTimeout(() => document.addEventListener('click', closeDeckMenu, { once: true }), 0);
  }
  function closeDeckMenu() { if (openMenu) { openMenu.remove(); openMenu = null; } }

  function setDeckLang(deckId) {
    const deck = state.decks.find(d => d.id === deckId);
    if (!deck) return;
    const current = deck.lang || 'es-ES';
    const lang = prompt(
      '발음 언어 코드 (예: es-ES 스페인어, en-US 영어, ja-JP 일본어, fr-FR, de-DE, zh-CN, ko-KR)',
      current
    );
    if (lang === null) return;
    const t = lang.trim();
    if (!t) { toast('언어 코드를 입력해줘'); return; }
    deck.lang = t;
    save();
    renderDeckBar();
    toast('언어 설정됨: ' + t);
  }

  function getDeckLang(deckId) {
    const d = state.decks.find(x => x.id === deckId);
    return (d && d.lang) || 'es-ES';
  }

  // ===== Speech =====
  function speak(text, lang) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang || 'es-ES';
    speechSynthesis.speak(u);
  }

  // ===== Examples (form rows) =====
  function addExampleRow(container, initial) {
    const row = document.createElement('div');
    row.className = 'example-row';
    row.innerHTML = `
      <button class="example-remove" type="button" title="삭제">×</button>
      <div class="field">
        <label>예문</label>
        <textarea data-ex="text" placeholder="예: Levanta la cabeza y respira profundo."></textarea>
      </div>
      <div class="field">
        <label>예문 뜻 (선택)</label>
        <input type="text" data-ex="meaning" placeholder="예: 고개를 들고 깊게 숨 쉬어" autocomplete="off">
      </div>
    `;
    if (initial) {
      row.querySelector('[data-ex="text"]').value = initial.text || '';
      row.querySelector('[data-ex="meaning"]').value = initial.meaning || '';
    }
    row.querySelector('.example-remove').addEventListener('click', () => row.remove());
    container.appendChild(row);
    return row;
  }

  function readExampleRowsFrom(container) {
    const rows = container.querySelectorAll('.example-row');
    const result = [];
    rows.forEach(r => {
      const text = r.querySelector('[data-ex="text"]').value.trim();
      const meaning = r.querySelector('[data-ex="meaning"]').value.trim();
      if (text) result.push({ id: uid(), text, meaning });
    });
    return result;
  }

  // ===== Add =====
  function clearAddForm() {
    $('#inputTerm').value = '';
    $('#inputMeaning').value = '';
    $('#exampleList').innerHTML = '';
    $('#inputTerm').focus();
  }
  $('#btnAddExample').addEventListener('click', () => addExampleRow($('#exampleList')));

  function addWord() {
    const term = $('#inputTerm').value.trim();
    const meaning = $('#inputMeaning').value.trim();
    if (!term || !meaning) { toast('단어와 뜻을 입력해줘'); return; }
    const examples = readExampleRowsFrom($('#exampleList'));
    const w = {
      id: uid(),
      deckId: state.currentDeckId,
      term, meaning,
      examples,
      created: Date.now(),
      correct: 0, wrong: 0
    };
    ensureWord(w);
    state.words.unshift(w);
    save();
    clearAddForm();
    toast(examples.length > 0 ? `추가됨 (예문 ${examples.length}개)` : '추가됨');

  });

  // ===== Meta =====
  function updateMeta() {
    const all = state.words.length;
    const inCurr = wordsInDeck(state.currentDeckId).length;
    $('#countList').textContent = inCurr;
    if (all === 0) $('#meta').textContent = '시작해보자';
    else if (state.decks.length === 1) $('#meta').textContent = `${all} palabras`;
    else $('#meta').textContent = `전체 ${all} · ${state.decks.length}개 단어장`;

    const ctx = $('#addContext');
    const deck = getCurrentDeck();
    if (deck) ctx.innerHTML = `현재 단어장: <strong>${escapeHtml(deck.name)}</strong>`;
  }

  // ===== List =====
  function renderList() {
    const q = $('#search').value.trim().toLowerCase();
    const list = $('#wordList');
    const inDeck = wordsInDeck(state.currentDeckId);
    const filtered = inDeck.filter(w => {
      if (!q) return true;
      if (w.term.toLowerCase().includes(q)) return true;
      if (w.meaning.toLowerCase().includes(q)) return true;
      return (w.examples || []).some(e =>
        e.text.toLowerCase().includes(q) || (e.meaning && e.meaning.toLowerCase().includes(q))
      );
    });

    if (filtered.length === 0) {
      const deck = getCurrentDeck();
      const msg = inDeck.length === 0
        ? `"${deck ? deck.name : ''}" 단어장이 비어있어`
        : '검색 결과 없음';
      list.innerHTML = `<div class="empty"><span class="ornament">· · ·</span>${escapeHtml(msg)}</div>`;
      return;
    }

    list.innerHTML = filtered.map(w => {
      const exs = w.examples || [];
      const deckLang = getDeckLang(w.deckId);
      const exsHtml = exs.length > 0 ? `
        <div class="word-examples">
          ${exs.map(e => `
            <div class="word-example">
              <div class="word-example-text">${escapeHtml(e.text)}<button class="speak-btn-tiny" data-speak="${escapeAttr(e.text)}" data-lang="${escapeAttr(deckLang)}" title="발음">♪</button></div>
              ${e.meaning ? `<div class="word-example-meaning">${escapeHtml(e.meaning)}</div>` : ''}
            </div>
          `).join('')}
        </div>` : '';
      return `
        <li class="word-item" data-id="${w.id}">
          <div class="word-head">
            <div>
              <div class="word-term">${escapeHtml(w.term)}<button class="speak-btn" data-speak="${escapeAttr(w.term)}" data-lang="${escapeAttr(deckLang)}" title="발음">♪</button></div>
              <div class="word-meaning">${escapeHtml(w.meaning)}</div>

            <div class="word-actions">
              <span class="stats">${w.correct || 0} · ${w.wrong || 0}</span>
              <button data-edit="${w.id}" title="편집">✎</button>
              <button class="danger" data-del="${w.id}" title="삭제">×</button>

      placeholder.id = 'editModal';
      placeholder.style.display = 'none';
      document.body.appendChild(placeholder);
    });
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.querySelector('#editCancel').click();
    });

    overlay.querySelector('#editSave').addEventListener('click', () => {
      const term = overlay.querySelector('#editTerm').value.trim();
      const meaning = overlay.querySelector('#editMeaning').value.trim();
      if (!term || !meaning) { toast('단어와 뜻을 입력해줘'); return; }
      const newExamples = readExampleRowsFrom(editList);
      // Preserve example IDs by text match (so we don't unnecessarily change ID on edit)
      const oldByText = {};
      (w.examples || []).forEach(e => { oldByText[e.text] = e; });
      newExamples.forEach(ne => {
        if (oldByText[ne.text]) ne.id = oldByText[ne.text].id;
      });
      w.term = term;
      w.meaning = meaning;
      w.examples = newExamples;
      save();
      overlay.querySelector('#editCancel').click();
      renderList();
      renderDeckBar();
      toast('저장됨');
    });

  // ===== Blank helpers =====
  // Find term inside text. Tries the term as-is, then with leading articles stripped,
  // then the LAST word of the term (handles verb phrases like "levantar la cabeza" → match "cabeza").
  function findTermInText(term, text) {
    if (!term || !text) return null;
    const t = term.trim();
    const candidates = [t];
    const stripped = t.replace(/^(la|el|los|las|un|una|unos|unas|the|a|an)\s+/i, '');
    if (stripped !== t && stripped.length > 0) candidates.push(stripped);
    // Last word fallback
    const parts = stripped.split(/\s+/);
    if (parts.length > 1) {
      const last = parts[parts.length - 1];
      if (last && last.length > 1) candidates.push(last);
    }

    for (const c of candidates) {
      const isAscii = /^[A-Za-zÀ-ÿ\s'\-]+$/.test(c);
      let m = null;
      if (isAscii) {
        const re = new RegExp(`\\b${escapeRegex(c)}\\b`, 'i');
        const found = text.match(re);
        if (found) m = { index: found.index, length: found[0].length, matched: found[0] };
      } else {
        const idx = text.toLowerCase().indexOf(c.toLowerCase());
        if (idx !== -1) m = { index: idx, length: c.length, matched: text.substr(idx, c.length) };
      }
      if (m) return m;
    }
    return null;
  }

  function hasBlankExample(w) {
    return (w.examples || []).some(e => findTermInText(w.term, e.text));
  }

  // ===== Quiz card building =====
  // Card shapes:
  //   { kind: 'term',  word, dir: 't2m'|'m2t' }
  //   { kind: 'blank', word, example, match: {index,length,matched} }
  function buildCards(words, mode) {
    const cards = [];
    for (const w of words) {
      const exs = w.examples || [];
      if (mode === 'blank') {
        for (const ex of exs) {
          const m = findTermInText(w.term, ex.text);
          if (m) cards.push({ kind: 'blank', word: w, example: ex, match: m });
        }
      } else if (mode === 't2m' || mode === 'm2t') {
        cards.push({ kind: 'term', word: w, dir: mode });
      } else if (mode === 'mix') {
        const dir = Math.random() < 0.5 ? 't2m' : 'm2t';
        cards.push({ kind: 'term', word: w, dir });
        for (const ex of exs) {
          const m = findTermInText(w.term, ex.text);
          if (m) cards.push({ kind: 'blank', word: w, example: ex, match: m });
        }
      }
    }
    return cards;
  }

    const validIds = new Set(state.decks.map(d => d.id));

  function startStudy() {
    if (studySelectedDecks.size === 0) { toast('단어장을 하나 이상 선택해줘'); return; }
    const pool = state.words.filter(w => studySelectedDecks.has(w.deckId));
    if (pool.length === 0) { toast('선택한 단어장에 단어가 없어'); return; }

    const cards = pool.slice();
    cards.sort(() => Math.random() - 0.5);
    // Resolve direction per card if mix
    cards.forEach(c => {
      c._studyDir = studyDir === 'mix' ? (Math.random() < 0.5 ? 't2m' : 'm2t') : studyDir;
    });

    studyState = { cards, idx: 0, flipped: false };

    $('#studySetup').style.display = 'none';
    $('#studyView').style.display = 'block';
    $('#studyDone').style.display = 'none';
    showStudyCard();

  function showStudyCard() {
    if (!studyState) return;
    const card = studyState.cards[studyState.idx];

    // Reset flipped (instant, no animation between cards)
    const inner = $('#flipCardInner');
    inner.style.transition = 'none';
    $('#flipCard').classList.remove('flipped');
    studyState.flipped = false;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { inner.style.transition = ''; });
    });

    $('#studyProgress').textContent = `${studyState.idx + 1} / ${studyState.cards.length}`;

    const dir = card._studyDir || 't2m';
    const deckLang = getDeckLang(card.deckId);

    const front = $('#flipFront');
    const back = $('#flipBack');

    // Helpers
    function buildExamplesHtml(card) {
      if (!card.examples || card.examples.length === 0) return '';
      let html = '<div class="flip-back-examples">';
      for (const ex of card.examples) {
        html += `<div class="flip-back-example">${escapeHtml(ex.text)}<button class="speak-btn-tiny" data-speak-ex="${escapeAttr(ex.text)}" type="button">♪</button>`;
        if (ex.meaning) {
          html += `<div class="flip-back-example-meaning">${escapeHtml(ex.meaning)}</div>`;
        }
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    if (dir === 't2m') {
      // Front: term (Spanish)
      front.innerHTML = `<div class="flip-side-main"></div>`;
      const fEl = front.querySelector('.flip-side-main');
      fEl.textContent = card.term;
      const sBtn = document.createElement('button');
      sBtn.className = 'speak-btn';
      sBtn.title = '발음';
      sBtn.textContent = '♪';
      sBtn.type = 'button';
      sBtn.addEventListener('click', e => { e.stopPropagation(); speak(card.term, deckLang); });
      fEl.appendChild(sBtn);
      // Back: meaning + examples
      back.innerHTML = `<div class="flip-side-main flip-side-meaning">${escapeHtml(card.meaning)}</div>` + buildExamplesHtml(card);
    } else {
      // Front: meaning (Korean)
      front.innerHTML = `<div class="flip-side-main flip-side-meaning">${escapeHtml(card.meaning)}</div>`;
      // Back: term + examples
      back.innerHTML = `<div class="flip-side-main"></div>` + buildExamplesHtml(card);
      const bEl = back.querySelector('.flip-side-main');
      bEl.textContent = card.term;
      const sBtn = document.createElement('button');
      sBtn.className = 'speak-btn';
      sBtn.title = '발음';
      sBtn.textContent = '♪';
      sBtn.type = 'button';
      sBtn.addEventListener('click', e => { e.stopPropagation(); speak(card.term, deckLang); });
      bEl.appendChild(sBtn);
    }

    // Wire up example speak buttons (always on back)
    back.querySelectorAll('[data-speak-ex]').forEach(b => {
      b.addEventListener('click', e => {
        e.stopPropagation();
        speak(b.dataset.speakEx, deckLang);
      });
    });

    $('#btnPrevStudy').disabled = studyState.idx === 0;
    $('#btnNextStudy').textContent = studyState.idx + 1 >= studyState.cards.length ? '끝내기 ✓' : '다음 →';

    // Match inner height to taller of front/back so absolute-positioned faces fit
    requestAnimationFrame(() => requestAnimationFrame(adjustFlipHeight));
  }

  function adjustFlipHeight() {
    const inner = $('#flipCardInner');
    const front = $('#flipFront');
    const back = $('#flipBack');
    if (!inner || !front || !back) return;
    const w = inner.offsetWidth;
    if (w === 0) return;

    function measure(el) {
      const clone = el.cloneNode(true);
      clone.style.position = 'absolute';
      clone.style.left = '-99999px';
      clone.style.top = '0';
      clone.style.transform = 'none';
      clone.style.visibility = 'hidden';
      clone.style.width = w + 'px';
      clone.style.height = 'auto';
      document.body.appendChild(clone);
      const h = clone.offsetHeight;
      document.body.removeChild(clone);
      return h;
    }

    const fH = measure(front);
    const bH = measure(back);
    inner.style.height = Math.max(fH, bH, 280) + 'px';
  }

  function flipStudyCard() {
    if (!studyState) return;
    studyState.flipped = !studyState.flipped;
    $('#flipCard').classList.toggle('flipped', studyState.flipped);
  }

  function nextStudyCard() {
    if (!studyState) return;
    if (studyState.idx + 1 >= studyState.cards.length) {
      finishStudy();
      return;
    }
    studyState.idx++;
    showStudyCard();
  }

  function prevStudyCard() {
    if (!studyState) return;
    if (studyState.idx === 0) return;
    studyState.idx--;
    showStudyCard();
  }

  function finishStudy() {
    $('#studyView').style.display = 'none';
    $('#studyDone').style.display = 'block';
    studyState = null;
  }

  $('#btnStartStudy').addEventListener('click', startStudy);

  $('#btnStudyRestart').addEventListener('click', resetStudyView);
  $('#flipCard').addEventListener('click', flipStudyCard);

  // Keyboard shortcuts (active only when on study view)
  document.addEventListener('keydown', e => {
    if (!studyState) return;
    if (!$('#panel-study').classList.contains('active')) return;
    if ($('#studyView').style.display === 'none') return;
    // Don't intercept if typing in an input
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) return;
    if (e.key === ' ') { e.preventDefault(); flipStudyCard(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); nextStudyCard(); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); prevStudyCard(); }

  // ===== Quiz =====
  let quizDir = 't2m';

  $$('#countOpts .opt').forEach(o => {

  function resetQuizView() {
    $('#quizSetup').style.display = 'block';
    $('#quizCard').style.display = 'none';
    $('#quizResult').style.display = 'none';
    const validIds = new Set(state.decks.map(d => d.id));
    quizSelectedDecks = new Set([...quizSelectedDecks].filter(id => validIds.has(id)));
    if (quizSelectedDecks.size === 0) quizSelectedDecks.add(state.currentDeckId);

  }

  $('#btnStartQuiz').addEventListener('click', () => {
    if (quizSelectedDecks.size === 0) { toast('단어장을 하나 이상 선택해줘'); return; }
    const wordsPool = state.words.filter(w => quizSelectedDecks.has(w.deckId));
    if (wordsPool.length === 0) { toast('선택한 단어장에 단어가 없어'); return; }

    let cards = buildCards(wordsPool, quizDir);
    if (cards.length === 0) {
      if (quizDir === 'blank') toast('예문 안에 단어가 들어간 게 없어');
      else toast('출제할 카드가 없어');
      return;
    }

    // SRS priority sort
    const now = Date.now();
    cards.forEach(c => {
      const srs = getCardSrs(c) || defaultSrs();
      c._priority = (now - srs.due) / DAY_MS + Math.random() * 0.3;
    });
    cards.sort((a, b) => b._priority - a._priority);

    const total = quizN === 'all' ? cards.length : Math.min(quizN, cards.length);
    cards = cards.slice(0, total);

    state.quiz = { cards, idx: 0, correct: 0, missed: [] };
    $('#quizSetup').style.display = 'none';
    $('#quizCard').style.display = 'block';
    $('#quizResult').style.display = 'none';
    showQuestion();
  });

  function kindLabel(card) {
    if (card.kind === 'term') return '단어';
    if (card.kind === 'blank') return '빈칸';
    return '';
  }

  function showQuestion() {
    const card = state.quiz.cards[state.quiz.idx];
    $('#quizProgress').textContent = `${state.quiz.idx + 1} / ${state.quiz.cards.length}`;
    $('#quizKind').textContent = kindLabel(card);

    const qEl = $('#quizQuestion');
    const hintEl = $('#quizHint');
    qEl.classList.remove('is-sentence');
    $('#quizAnswer').style.display = 'none';

    if (card.kind === 'blank') {
      const w = card.word;
      const ex = card.example;
      const m = card.match;
      const before = ex.text.slice(0, m.index);
      const after = ex.text.slice(m.index + m.length);
      qEl.classList.add('is-sentence');
      qEl.innerHTML = escapeHtml(before)
        + '<span class="blank-mark">' + escapeHtml(m.matched) + '</span>'
        + escapeHtml(after);
      hintEl.textContent = `'${w.term}' — ${w.meaning}`;

      $('#quizControls').innerHTML = `
        <div class="quiz-blank-input-row">
          <input type="text" id="blankInput" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="입력...">
          <button class="btn" id="btnCheck">확인</button>
        </div>`;
      const inp = $('#blankInput');
      setTimeout(() => inp.focus(), 50);
      inp.addEventListener('keydown', ev => {
        if (ev.key === 'Enter') { ev.preventDefault(); checkBlank(); }
      });
      $('#btnCheck').addEventListener('click', checkBlank);
    } else {
      // term card
      const w = card.word;
      const deckLang = getDeckLang(w.deckId);
      const isT2M = card.dir === 't2m';
      const question = isT2M ? w.term : w.meaning;
      qEl.innerHTML = escapeHtml(question);
      if (isT2M) {
        const btn = document.createElement('button');
        btn.className = 'speak-btn';
        btn.title = '발음';
        btn.textContent = '♪';
        btn.addEventListener('click', () => speak(w.term, deckLang));
        qEl.appendChild(btn);
      }
      hintEl.textContent = isT2M ? '뜻은?' : '단어는?';
      $('#quizControls').innerHTML = `<button class="btn" id="btnReveal">정답 보기</button>`;
      $('#btnReveal').addEventListener('click', revealAnswer);
    }
  }

  function renderGradeButtons() {
    const card = state.quiz.cards[state.quiz.idx];
    const srs = getCardSrs(card) || defaultSrs();
    const wrap = $('#quizControls');
    wrap.innerHTML = `
      <div class="grade-row">
        <button class="btn-grade btn-again" data-rating="again">다시<span class="interval">${previewInterval(srs, 'again')}</span></button>
        <button class="btn-grade btn-hard" data-rating="hard">어려움<span class="interval">${previewInterval(srs, 'hard')}</span></button>
        <button class="btn-grade btn-good" data-rating="good">좋음<span class="interval">${previewInterval(srs, 'good')}</span></button>
        <button class="btn-grade btn-easy" data-rating="easy">쉬움<span class="interval">${previewInterval(srs, 'easy')}</span></button>
      </div>`;
    wrap.querySelectorAll('[data-rating]').forEach(b => {
      b.addEventListener('click', () => grade(b.dataset.rating));
    });
  }

  function revealAnswer() {
    const card = state.quiz.cards[state.quiz.idx];
    const w = card.word;
    const deckLang = getDeckLang(w.deckId);
    const isT2M = card.dir === 't2m';
    const answer = isT2M ? w.meaning : w.term;
    let speakText = isT2M ? null : w.term;

    const a = $('#quizAnswer');
    let answerHtml = escapeHtml(answer);
    if (speakText) answerHtml += ` <button class="speak-btn-tiny" data-speak-answer>♪</button>`;

    // Show first example (if any) below the answer for context
    let sub = '';
    const ex = (w.examples || [])[0];
    if (ex) {
      sub = `<button class="speak-btn-tiny" data-speak-ex>♪</button> ${escapeHtml(ex.text)}`;
      if (ex.meaning) sub += `<br><span style="font-style:normal;font-size:12px;">${escapeHtml(ex.meaning)}</span>`;
    }
    a.innerHTML = answerHtml + (sub ? `<span class="note">${sub}</span>` : '');
    a.style.display = 'block';

    if (speakText) {
      const b = a.querySelector('[data-speak-answer]');
      if (b) b.addEventListener('click', () => speak(speakText, deckLang));
    }
    if (ex) {
      const b = a.querySelector('[data-speak-ex]');
      if (b) b.addEventListener('click', () => speak(ex.text, deckLang));
    }
    renderGradeButtons();
  }

  function checkBlank() {
    const input = $('#blankInput');
    const userAns = input.value.trim();
    if (!userAns) return;

    const card = state.quiz.cards[state.quiz.idx];
    const w = card.word;
    const ex = card.example;
    const m = card.match;
    const userL = userAns.toLowerCase();
    const correctL = m.matched.toLowerCase();
    const termL = w.term.toLowerCase();
    const acceptable = new Set([
      correctL, termL,
      termL.replace(/^(la|el|los|las|un|una|unos|unas|the|a|an)\s+/, '')
    ]);
    const isCorrect = acceptable.has(userL);

    const qEl = $('#quizQuestion');
    const before = ex.text.slice(0, m.index);
    const after = ex.text.slice(m.index + m.length);
    const cls = isCorrect ? 'correct' : 'wrong';
    qEl.innerHTML = escapeHtml(before)
      + '<span class="blank-filled ' + cls + '">' + escapeHtml(m.matched) + '</span>'
      + escapeHtml(after);

    // Speak button for the example
    const speakBtn = document.createElement('button');
    speakBtn.className = 'speak-btn-tiny';
    speakBtn.title = '발음';
    speakBtn.textContent = '♪';
    speakBtn.addEventListener('click', () => speak(ex.text, getDeckLang(w.deckId)));
    qEl.appendChild(speakBtn);

    const a = $('#quizAnswer');
    let feedback;
    if (isCorrect) feedback = `<span class="quiz-feedback correct">✓ 정답</span>`;
    else feedback = `<span class="quiz-feedback wrong"><span class="user-ans">${escapeHtml(userAns)}</span><span class="arrow">→</span><span class="correct-ans">${escapeHtml(m.matched)}</span></span>`;
    let exMeaningHtml = '';
    if (ex.meaning) exMeaningHtml = `<span class="note" style="font-style:normal;">${escapeHtml(ex.meaning)}</span>`;
    a.innerHTML = feedback + `<span class="note">${escapeHtml(w.term)} — ${escapeHtml(w.meaning)}</span>` + exMeaningHtml;
    a.style.display = 'block';

    renderGradeButtons();
    const suggested = isCorrect ? 'good' : 'again';
    setTimeout(() => {
      const btn = $('#quizControls').querySelector(`[data-rating="${suggested}"]`);
      if (btn) btn.focus();
    }, 50);
  }

  function grade(rating) {
    const card = state.quiz.cards[state.quiz.idx];
    const isWrong = rating === 'again';

    const oldSrs = getCardSrs(card) || defaultSrs();
    setCardSrs(card, updateSrs(oldSrs, rating));

    const w = state.words.find(x => x.id === card.word.id);
    if (w) {
      if (isWrong) w.wrong = (w.wrong || 0) + 1;
      else w.correct = (w.correct || 0) + 1;
    }

    if (isWrong) state.quiz.missed.push(card);
    else state.quiz.correct++;

    save();
    state.quiz.idx++;
    if (state.quiz.idx >= state.quiz.cards.length) finishQuiz();
    else showQuestion();
  }

  function finishQuiz() {
    $('#quizCard').style.display = 'none';
    $('#quizResult').style.display = 'block';

    const total = state.quiz.cards.length;
    const correct = state.quiz.correct;
    const ratio = correct / total;
    $('#resCorrect').textContent = correct;
    $('#resTotal').textContent = total;

    let label;
    if (ratio === 1) label = '¡Perfecto! 완벽해';
    else if (ratio >= 0.8) label = 'Muy bien · 훌륭해';
    else if (ratio >= 0.6) label = 'Bien · 나쁘지 않아';
    else if (ratio >= 0.3) label = 'Otra vez · 다시 한 번';
    else label = 'Despacio · 천천히, 다시';
    $('#resLabel').textContent = label;

    if (state.quiz.missed.length > 0) {
      $('#resMissed').style.display = 'block';
      $('#resMissedList').innerHTML = state.quiz.missed.map(card => {
        if (card.kind === 'term') {
          return `<div class="result-missed-item">
            <div class="ctx">단어</div>
            <div class="t">${escapeHtml(card.word.term)}</div>
            <div class="m">${escapeHtml(card.word.meaning)}</div>
          </div>`;
        } else {
          return `<div class="result-missed-item">
            <div class="ctx">빈칸 — ${escapeHtml(card.word.term)}</div>
            <div class="t">${escapeHtml(card.example.text)}</div>
            <div class="m">정답: ${escapeHtml(card.match.matched)}</div>
          </div>`;
        }
      }).join('');
    } else {
      $('#resMissed').style.display = 'none';
    }

    state.quiz = null;
  }

  $('#btnRestart').addEventListener('click', resetQuizView);

  // ===== Export / Import =====
  $('#btnExport').addEventListener('click', () => {
    const data = JSON.stringify({
      version: 3,
      decks: state.decks,
      words: state.words,
      exported: new Date().toISOString()
    }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `vocab-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('내보냄');
  });

  $('#btnImport').addEventListener('click', () => $('#fileInput').click());
  $('#fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const migrated = migrateData(parsed);
        if (!migrated) throw new Error('빈 데이터');

        // Merge: add decks by name, merge words by (deck, term)
        const deckIdMap = {};
        (migrated.decks || []).forEach(d => {
          const ex = state.decks.find(x => x.name === d.name);
          if (ex) deckIdMap[d.id] = ex.id;
          else {
            const newDeck = { id: 'd_' + uid(), name: d.name, created: d.created || Date.now() };
            if (d.lang) newDeck.lang = d.lang;
            state.decks.push(newDeck);
            deckIdMap[d.id] = newDeck.id;
          }
        });
        const existingKeys = new Set(state.words.map(w => `${w.deckId}::${w.term.toLowerCase()}`));
        let added = 0;
        for (const w of (migrated.words || [])) {
          const newDeckId = deckIdMap[w.deckId] || state.currentDeckId;
          const key = `${newDeckId}::${w.term.toLowerCase()}`;
          if (existingKeys.has(key)) continue;
          existingKeys.add(key);
          const nw = {
            id: uid(),
            deckId: newDeckId,
            term: w.term, meaning: w.meaning,
            examples: Array.isArray(w.examples) ? w.examples.map(e => ({
              id: uid(), text: e.text, meaning: e.meaning || ''
            })) : [],
            created: w.created || Date.now(),
            correct: w.correct || 0, wrong: w.wrong || 0
          };
          if (w.srs) nw.srs = w.srs;
          if (w.srsBlank) nw.srsBlank = w.srsBlank;
          ensureWord(nw);
          state.words.unshift(nw);
          added++;
        }
        save();
        renderDeckBar();
        renderList();
        updateMeta();
        toast(`${added}개 추가됨`);
      } catch (err) {
        console.error(err);
        toast('파일을 읽을 수 없어');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  $('#btnReset').addEventListener('click', () => {
    if (state.words.length === 0 && state.decks.length <= 1) { toast('이미 비어있어'); return; }
    if (confirm(`전체 단어장(${state.decks.length}개)과 단어(${state.words.length}개)를 모두 삭제할까? (되돌릴 수 없음)`)) {
      state.decks = [];
      state.words = [];
      state.currentDeckId = null;
      quizSelectedDecks = new Set();
      ensureValidDeckState();
      save();
      renderDeckBar();
      renderList();
      updateMeta();
      toast('전체 삭제됨');
    }
  });

  // ===== Init =====
  load();
  renderDeckBar();
  updateMeta();
  renderList();

  $('#btnSignin').addEventListener('click', handleSignin);
  $('#btnSignup').addEventListener('click', handleSignup);
  $('#btnLogout').addEventListener('click', handleLogout);
  $('#authPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); handleSignin(); }
  });
  $('#authEmail').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); $('#authPassword').focus(); }
  });

  window.addEventListener('focus', () => { if (currentUser) syncPull(); });
  window.addEventListener('resize', () => {
    if (studyState && $('#panel-study').classList.contains('active')) adjustFlipHeight();
  });
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && currentUser) syncPull();
  });
  window.addEventListener('online', () => { if (currentUser) syncPush(); });
  window.addEventListener('offline', () => setSyncStatus('offline'));

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session && session.user) {
      currentUser = session.user;
      await onAuthenticated();
      $('#inputTerm').focus();
    } else {
      setSyncStatus('offline');
      showAuthOverlay();
      $('#authEmail').focus();
    }
  })();

  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT') {
      currentUser = null;
      setSyncStatus('offline');
      showAuthOverlay();
    } else if (event === 'SIGNED_IN' && session && !currentUser) {
      currentUser = session.user;
      hideAuthOverlay();
      onAuthenticated();
    }
  });
</script>
</body>
</html>
