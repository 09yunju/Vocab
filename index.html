<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>단어장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --paper: #f4efe4;
    --paper-2: #ebe4d3;
    --ink: #1f1a14;
    --ink-soft: #4a3f30;
    --ink-faint: #8a7b62;
    --rule: #c9bfa6;
    --accent: #8b1e1e;
    --accent-soft: #b85a3c;
    --good: #3d5a3d;
    --bad: #8b1e1e;
    --shadow: 0 1px 0 rgba(31, 26, 20, 0.06), 0 12px 40px -12px rgba(31, 26, 20, 0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Sans KR', system-ui, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 30%, rgba(139, 30, 30, 0.03) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(74, 63, 48, 0.04) 0%, transparent 40%);
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--rule);
    padding-bottom: 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  h1 {
    font-family: 'Fraunces', 'Gowun Batang', serif;
    font-weight: 500;
    font-size: 38px;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  h1 .dot { color: var(--accent); }

  .meta {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faint);
  }

  /* Deck bar */
  .deck-bar {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 4px 0 14px;
    margin-bottom: 14px;
    border-bottom: 1px dashed var(--rule);
    -webkit-overflow-scrolling: touch;
  }

  .deck-bar::-webkit-scrollbar { height: 4px; }
  .deck-bar::-webkit-scrollbar-track { background: transparent; }
  .deck-bar::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

  .deck-pill {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'IBM Plex Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .deck-pill:hover { color: var(--ink); border-color: var(--ink-soft); }
  .deck-pill.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .deck-pill.add {
    color: var(--ink-faint);
    border-style: dashed;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
  }
  .deck-pill .deck-count {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 11px;
    opacity: 0.65;
  }
  .deck-pill.active .deck-count { color: var(--paper); opacity: 0.65; }

  .deck-menu {
    position: fixed;
    background: var(--paper);
    border: 1px solid var(--ink-soft);
    border-radius: 3px;
    box-shadow: 0 12px 32px rgba(31, 26, 20, 0.18);
    padding: 4px;
    z-index: 100;
    min-width: 150px;
    animation: menuIn 0.12s ease;
  }
  @keyframes menuIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .deck-menu button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 9px 14px;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.1s;
  }
  .deck-menu button:hover { background: var(--paper-2); color: var(--ink); }
  .deck-menu button.danger:hover { color: var(--accent); }

  /* Tabs */
  nav.tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--rule);
  }

  .tab {
    background: none;
    border: none;
    font-family: 'IBM Plex Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 16px;
    color: var(--ink-faint);
    cursor: pointer;
    position: relative;
    transition: color 0.15s;
    letter-spacing: 0.02em;
  }

  .tab:hover { color: var(--ink-soft); }
  .tab.active { color: var(--ink); }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
  }

  .tab .count {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-faint);
    margin-left: 4px;
  }

  /* Panels */
  .panel { display: none; animation: fade 0.25s ease; }
  .panel.active { display: block; }

  @keyframes fade {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Forms */
  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  input[type="text"], textarea {
    width: 100%;
    background: var(--paper-2);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 12px 14px;
    font-family: 'IBM Plex Sans KR', sans-serif;
    font-size: 16px;
    color: var(--ink);
    transition: border-color 0.15s, background 0.15s;
  }

  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--ink-soft);
    background: #fbf8ef;
  }

  textarea { resize: vertical; min-height: 60px; font-family: inherit; }

  /* Buttons */
  .btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 12px 22px;
    font-family: 'IBM Plex Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    border-radius: 2px;
    transition: transform 0.1s, background 0.15s;
  }
  .btn:hover { background: var(--accent); }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:disabled:hover { background: var(--ink); }

  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--rule);
  }
  .btn-ghost:hover { background: var(--paper-2); color: var(--ink); }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  .add-context {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faint);
    margin-bottom: 16px;
  }
  .add-context strong {
    font-weight: 500;
    color: var(--ink-soft);
  }

  /* Expression rows in form */
  .section-divider {
    margin: 24px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px dashed var(--rule);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .section-divider .title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .section-divider .hint {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-faint);
  }

  .expr-row {
    background: var(--paper-2);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--accent);
    border-radius: 2px;
    padding: 14px 14px 8px;
    margin-bottom: 8px;
    position: relative;
  }
  .expr-row .field { margin-bottom: 10px; }
  .expr-row label {
    font-size: 11px;
    margin-bottom: 4px;
  }
  .expr-row input, .expr-row textarea {
    background: var(--paper);
    font-size: 14px;
    padding: 8px 10px;
  }
  .expr-row textarea {
    min-height: 38px;
  }
  .expr-remove {
    position: absolute;
    top: 6px;
    right: 6px;
    background: none;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 18px;
    padding: 2px 8px;
    border-radius: 2px;
    line-height: 1;
  }
  .expr-remove:hover { color: var(--accent); }

  .expr-add-btn {
    background: transparent;
    border: 1px dashed var(--rule);
    color: var(--ink-faint);
    padding: 12px;
    width: 100%;
    cursor: pointer;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    border-radius: 2px;
    margin-bottom: 18px;
    transition: all 0.15s;
  }
  .expr-add-btn:hover { color: var(--ink); border-color: var(--ink-soft); }

  /* Word list */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    align-items: center;
  }
  .toolbar input { flex: 1; }

  .word-list { list-style: none; }

  .word-item {
    padding: 18px 0;
    border-bottom: 1px solid var(--rule);
  }
  .word-head {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px 16px;
    align-items: start;
  }

  .word-term {
    font-family: 'Fraunces', 'Gowun Batang', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  .word-meaning {
    font-size: 15px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  .word-note {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faint);
    margin-top: 4px;
  }

  .word-actions {
    text-align: right;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-faint);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .word-actions .stats { white-space: nowrap; }

  .word-actions button {
    background: none;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 14px;
    padding: 4px 6px;
    border-radius: 2px;
    transition: color 0.15s, background 0.15s;
  }
  .word-actions button:hover { color: var(--ink); background: var(--paper-2); }
  .word-actions button.danger:hover { color: var(--accent); }

  /* Expression list inside word item */
  .word-expressions {
    margin-top: 10px;
    margin-left: 0;
    padding-left: 14px;
    border-left: 2px solid var(--rule);
  }
  .word-expr {
    padding: 8px 0;
  }
  .word-expr:not(:last-child) {
    border-bottom: 1px dotted var(--rule);
  }
  .word-expr-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }
  .word-expr-phrase {
    font-family: 'Fraunces', 'Gowun Batang', serif;
    font-weight: 500;
    color: var(--ink);
    font-size: 16px;
  }
  .word-expr-meaning {
    color: var(--ink-soft);
    font-size: 13px;
  }
  .word-expr-meaning::before {
    content: '·';
    margin-right: 6px;
    color: var(--ink-faint);
  }
  .word-expr-example {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faint);
    margin-top: 3px;
  }
  .word-expr-example-meaning {
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 1px;
    padding-left: 12px;
    border-left: 2px solid var(--paper-2);
  }
  .word-expr-stats {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-faint);
    margin-left: auto;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
  }

  /* Quiz */
  .quiz-setup {
    background: var(--paper-2);
    border: 1px solid var(--rule);
    padding: 24px;
    border-radius: 2px;
    margin-bottom: 20px;
  }

  .quiz-setup h3 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 20px;
    margin-bottom: 16px;
  }

  .opt-row {
    display: flex;
    gap: 8px;
    margin-bottom: 0;
    flex-wrap: wrap;
  }

  .opt {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
    border-radius: 2px;
    color: var(--ink-soft);
    font-family: inherit;
    transition: all 0.15s;
  }
  .opt:hover { border-color: var(--ink-soft); }
  .opt.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .quiz-deck-count {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 11px;
    opacity: 0.65;
    margin-left: 4px;
  }

  .quiz-card {
    background: var(--paper-2);
    border: 1px solid var(--rule);
    padding: 48px 28px;
    border-radius: 2px;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .quiz-card::before {
    content: '';
    position: absolute;
    top: 16px; left: 16px; right: 16px; bottom: 16px;
    border: 1px solid var(--rule);
    pointer-events: none;
    border-radius: 1px;
  }

  .quiz-progress {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faint);
    margin-bottom: 4px;
    position: relative;
    z-index: 1;
  }

  .quiz-kind {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 18px;
    position: relative;
    z-index: 1;
  }

  .quiz-question {
    font-family: 'Fraunces', 'Gowun Batang', serif;
    font-size: 38px;
    font-weight: 500;
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
    word-break: keep-all;
  }

  .quiz-question.is-sentence {
    font-size: 24px;
    line-height: 1.5;
    font-weight: 500;
  }

  .quiz-question.is-phrase {
    font-size: 30px;
  }

  .quiz-context {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faint);
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  .quiz-hint {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faint);
    position: relative;
    z-index: 1;
  }

  .quiz-answer {
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px dashed var(--rule);
    font-size: 22px;
    color: var(--ink-soft);
    font-weight: 500;
    position: relative;
    z-index: 1;
    animation: fade 0.3s ease;
  }

  .quiz-answer .note {
    display: block;
    margin-top: 8px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-faint);
    font-weight: 400;
  }

  .quiz-controls {
    display: flex;
    gap: 8px;
    margin-top: 24px;
    justify-content: center;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .btn-good { background: var(--good); color: var(--paper); }
  .btn-good:hover { background: #2d432d; }
  .btn-bad { background: var(--bad); color: var(--paper); }
  .btn-bad:hover { background: #6b1717; }

  /* SRS 4-grade buttons */
  .grade-row {
    display: flex;
    gap: 6px;
    margin-top: 24px;
    justify-content: center;
    flex-wrap: nowrap;
    position: relative;
    z-index: 1;
  }
  .btn-grade {
    flex: 1 1 0;
    min-width: 0;
    padding: 10px 6px;
    font-family: 'IBM Plex Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--paper);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: transform 0.1s, filter 0.15s;
  }
  .btn-grade:hover { filter: brightness(1.1); }
  .btn-grade:active { transform: translateY(1px); }
  .btn-grade .interval {
    font-size: 10px;
    font-weight: 400;
    font-family: 'Fraunces', serif;
    font-style: italic;
    opacity: 0.75;
  }
  .btn-again { background: #8b1e1e; }
  .btn-hard { background: #b85a3c; }
  .btn-grade.btn-good { background: #3d5a3d; }
  .btn-easy { background: #5a7a5a; }

  .speak-btn {
    background: none;
    border: 1px solid var(--rule);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    color: var(--ink-faint);
    margin-left: 6px;
    vertical-align: middle;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
  }
  .speak-btn:hover { background: var(--paper); color: var(--accent); }

  .speak-btn-tiny {
    background: none;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 11px;
    padding: 1px 4px;
    margin-left: 4px;
    vertical-align: baseline;
    transition: color 0.15s;
    line-height: 1;
  }
  .speak-btn-tiny:hover { color: var(--accent); }

  /* Blank quiz mode */
  .blank-mark {
    display: inline-block;
    min-width: 70px;
    padding: 0 6px;
    margin: 0 2px;
    border-bottom: 2px solid var(--accent);
    color: transparent;
    user-select: none;
    font-weight: 700;
  }
  .blank-filled {
    font-weight: 700;
    padding: 0 4px;
    border-bottom: 2px solid;
  }
  .blank-filled.correct { color: var(--good); border-color: var(--good); }
  .blank-filled.wrong { color: var(--accent); border-color: var(--accent); }

  .quiz-blank-input-row {
    margin-top: 24px;
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }
  .quiz-blank-input-row input {
    font-family: 'Fraunces', 'Gowun Batang', serif;
    font-size: 20px;
    padding: 10px 16px;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 2px;
    text-align: center;
    width: auto;
    max-width: 240px;
  }
  .quiz-blank-input-row input:focus {
    outline: none;
    border-color: var(--ink);
    background: #fbf8ef;
  }

  .quiz-feedback {
    font-family: 'Fraunces', 'Gowun Batang', serif;
    font-weight: 500;
    display: inline;
  }
  .quiz-feedback.correct { color: var(--good); }
  .quiz-feedback.wrong { color: var(--ink-soft); }
  .quiz-feedback .user-ans {
    text-decoration: line-through;
    color: var(--accent);
    margin-right: 6px;
  }
  .quiz-feedback .arrow {
    margin: 0 6px;
    color: var(--ink-faint);
    font-style: italic;
  }
  .quiz-feedback .correct-ans { color: var(--good); }

  /* Result */
  .result {
    text-align: center;
    padding: 40px 20px;
  }
  .result-score {
    font-family: 'Fraunces', serif;
    font-size: 64px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-score .slash { color: var(--ink-faint); margin: 0 4px; }
  .result-label {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--ink-faint);
    margin-bottom: 32px;
  }

  .result-missed {
    text-align: left;
    margin-top: 24px;
    border-top: 1px solid var(--rule);
    padding-top: 20px;
  }
  .result-missed h4 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-faint);
    margin-bottom: 12px;
    font-weight: 400;
  }
  .result-missed-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--paper-2);
  }
  .result-missed-item .t {
    font-family: 'Fraunces', 'Gowun Batang', serif;
    font-size: 17px;
    font-weight: 500;
  }
  .result-missed-item .m {
    color: var(--ink-soft);
    font-size: 14px;
    margin-top: 2px;
  }
  .result-missed-item .ctx {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-faint);
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(31, 26, 20, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    animation: fade 0.2s ease;
    padding: 20px;
  }
  .modal {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 3px;
    box-shadow: 0 24px 60px rgba(31, 26, 20, 0.3);
    width: 100%;
    max-width: 580px;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
    padding: 28px;
  }
  .modal h3 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 22px;
    margin-bottom: 20px;
  }

  /* Footer */
  footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
  }

  footer .left, footer .right { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn-tiny {
    background: none;
    border: 1px solid var(--rule);
    padding: 6px 12px;
    font-size: 12px;
    color: var(--ink-faint);
    cursor: pointer;
    border-radius: 2px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-tiny:hover { color: var(--ink); border-color: var(--ink-soft); }
  .btn-tiny.danger:hover { color: var(--accent); border-color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    padding: 10px 18px;
    border-radius: 2px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 1000;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Auth screen */
  .auth-overlay {
    position: fixed;
    inset: 0;
    background: var(--paper);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .auth-card {
    width: 100%;
    max-width: 360px;
  }
  .auth-card h2 {
    font-family: 'Fraunces', 'Gowun Batang', serif;
    font-weight: 500;
    font-size: 36px;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .auth-card h2 .dot { color: var(--accent); }
  .auth-card .auth-sub {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faint);
    margin-bottom: 24px;
  }
  .auth-card .field { margin-bottom: 14px; }
  .auth-card input[type="email"], .auth-card input[type="password"] {
    width: 100%;
    background: var(--paper-2);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 12px 14px;
    font-family: 'IBM Plex Sans KR', sans-serif;
    font-size: 16px;
    color: var(--ink);
  }
  .auth-card input:focus {
    outline: none;
    border-color: var(--ink-soft);
    background: #fbf8ef;
  }
  .auth-error {
    color: var(--accent);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    margin-bottom: 12px;
    min-height: 18px;
  }
  .auth-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .auth-actions .btn { flex: 1; }

  /* Sync status badge in footer */
  .sync-status {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-faint);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-right: 8px;
  }
  .sync-status::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--ink-faint);
  }
  .sync-status.synced::before { background: var(--good); }
  .sync-status.syncing::before { background: #b85a3c; animation: pulse 1s infinite; }
  .sync-status.offline::before { background: var(--ink-faint); }
  .sync-status.error::before { background: var(--accent); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @media (max-width: 480px) {
    .app { padding: 20px 16px 60px; }
    h1 { font-size: 30px; }
    .quiz-question { font-size: 30px; }
    .quiz-question.is-sentence { font-size: 20px; }
    .quiz-question.is-phrase { font-size: 24px; }
    .quiz-card { padding: 36px 20px; }
    .result-score { font-size: 48px; }
    .modal { padding: 20px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>단어장<span class="dot">.</span></h1>
    <div class="meta" id="meta">시작해보자</div>
  </header>

  <div class="deck-bar" id="deckBar"></div>

  <nav class="tabs">
    <button class="tab active" data-tab="add">추가</button>
    <button class="tab" data-tab="list">목록 <span class="count" id="countList">0</span></button>
    <button class="tab" data-tab="quiz">시험</button>
  </nav>

  <!-- ADD -->
  <section class="panel active" id="panel-add">
    <div class="add-context" id="addContext"></div>

    <div class="field">
      <label>단어 / Term (헤드워드)</label>
      <input type="text" id="inputTerm" placeholder="예: la cabeza" autocomplete="off">
    </div>
    <div class="field">
      <label>뜻 / Meaning</label>
      <input type="text" id="inputMeaning" placeholder="예: 고개" autocomplete="off">
    </div>

    <div class="section-divider">
      <span class="title">표현 (Expressions) — 선택</span>
      <span class="hint">단어가 사용되는 표현들</span>
    </div>
    <div id="exprList"></div>
    <button class="expr-add-btn" id="btnAddExpr">+ 표현 추가</button>

    <div class="btn-row">
      <button class="btn" id="btnAdd">추가하기</button>
      <button class="btn btn-ghost" id="btnClear">지우기</button>
    </div>
  </section>

  <!-- LIST -->
  <section class="panel" id="panel-list">
    <div class="toolbar">
      <input type="text" id="search" placeholder="검색..." autocomplete="off">
    </div>
    <ul class="word-list" id="wordList"></ul>
  </section>

  <!-- QUIZ -->
  <section class="panel" id="panel-quiz">
    <div id="quizSetup" class="quiz-setup">
      <h3>시험 설정</h3>
      <div class="field">
        <label>단어장 <span style="font-style:normal;font-size:11px;color:var(--ink-faint);">(여러 개 선택 가능)</span></label>
        <div class="opt-row" id="quizDeckOpts"></div>
      </div>
      <div class="field">
        <label>방향</label>
        <div class="opt-row" id="dirOpts">
          <button class="opt active" data-dir="t2m">단어/표현 → 뜻</button>
          <button class="opt" data-dir="m2t">뜻 → 단어/표현</button>
          <button class="opt" data-dir="blank">빈칸 (예문)</button>
          <button class="opt" data-dir="mix">섞기</button>
        </div>
      </div>
      <div class="field">
        <label>문제 수</label>
        <div class="opt-row" id="countOpts">
          <button class="opt" data-n="5">5</button>
          <button class="opt active" data-n="10">10</button>
          <button class="opt" data-n="20">20</button>
          <button class="opt" data-n="all">전체</button>
        </div>
      </div>
      <button class="btn" id="btnStartQuiz">시작</button>
    </div>

    <div id="quizCard" class="quiz-card" style="display:none;">
      <div class="quiz-progress" id="quizProgress"></div>
      <div class="quiz-kind" id="quizKind"></div>
      <div class="quiz-context" id="quizContext"></div>
      <div class="quiz-question" id="quizQuestion"></div>
      <div class="quiz-hint" id="quizHint"></div>
      <div class="quiz-answer" id="quizAnswer" style="display:none;"></div>
      <div class="quiz-controls" id="quizControls"></div>
    </div>

    <div id="quizResult" class="result" style="display:none;">
      <div class="result-score">
        <span id="resCorrect">0</span><span class="slash">/</span><span id="resTotal">0</span>
      </div>
      <div class="result-label" id="resLabel">잘했어!</div>
      <button class="btn" id="btnRestart">다시</button>
      <div class="result-missed" id="resMissed" style="display:none;">
        <h4>틀린 것</h4>
        <div id="resMissedList"></div>
      </div>
    </div>
  </section>

  <footer>
    <div class="left">
      <span class="sync-status" id="syncStatus" title="동기화 상태">동기화 됨</span>
      <button class="btn-tiny" id="btnExport">내보내기</button>
      <button class="btn-tiny" id="btnImport">가져오기</button>
      <input type="file" id="fileInput" accept=".json" style="display:none">
    </div>
    <div class="right">
      <button class="btn-tiny" id="btnLogout">로그아웃</button>
      <button class="btn-tiny danger" id="btnReset">전체 삭제</button>
    </div>
  </footer>
</div>

<!-- Edit Modal -->
<div id="editModal" style="display:none;"></div>

<!-- Auth overlay -->
<div class="auth-overlay" id="authOverlay" style="display:none;">
  <div class="auth-card">
    <h2>단어장<span class="dot">.</span></h2>
    <div class="auth-sub" id="authSub">시작하려면 로그인 또는 회원가입</div>
    <div class="field">
      <input type="email" id="authEmail" placeholder="이메일" autocomplete="email">
    </div>
    <div class="field">
      <input type="password" id="authPassword" placeholder="비밀번호 (6자 이상)" autocomplete="current-password">
    </div>
    <div class="auth-error" id="authError"></div>
    <div class="auth-actions">
      <button class="btn btn-ghost" id="btnSignup">회원가입</button>
      <button class="btn" id="btnSignin">로그인</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ===== Supabase config =====
  const SUPABASE_URL = 'https://fvhnuuickbagzxsulpxl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_W9YN6x8P7DuetlY8UY8Ghw_11F-1hAQ';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      storage: window.localStorage,
      storageKey: 'vocab.auth'
    }
  });

  let currentUser = null;

  const STORAGE_KEY = 'vocab.v2';
  const OLD_KEY = 'vocab.v1';

  let state = {
    decks: [],
    currentDeckId: null,
    words: [],
    quiz: null,
    lastSyncedAt: 0
  };

  let quizSelectedDecks = new Set();

  // ===== Helpers =====
  function $(s) { return document.querySelector(s); }
  function $$(s) { return document.querySelectorAll(s); }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }

  function escapeRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function toast(msg) {
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove('show'), 1800);
  }

  function getCurrentDeck() {
    return state.decks.find(d => d.id === state.currentDeckId);
  }

  function wordsInDeck(deckId) {
    return state.words.filter(w => w.deckId === deckId);
  }

  function ensureExpressions(w) {
    if (!Array.isArray(w.expressions)) w.expressions = [];
    return w;
  }

  // ===== Storage / Migration =====
  function save() {
    saveLocal();
    if (currentUser) queuePush();
  }

  function saveLocal() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      decks: state.decks,
      currentDeckId: state.currentDeckId,
      words: state.words,
      lastSyncedAt: state.lastSyncedAt || 0
    }));
    updateMeta();
  }

  function load() {
    try {
      const v2 = localStorage.getItem(STORAGE_KEY);
      if (v2) {
        const data = JSON.parse(v2);
        state.decks = Array.isArray(data.decks) ? data.decks : [];
        state.currentDeckId = data.currentDeckId;
        state.lastSyncedAt = data.lastSyncedAt || 0;
        state.words = Array.isArray(data.words) ? data.words.map(w => {
          ensureExpressions(w);
          ensureWordSrs(w);
          w.expressions.forEach(ensureExprSrs);
          return w;
        }) : [];
        ensureValidDeckState();
        return;
      }
      const v1 = localStorage.getItem(OLD_KEY);
      if (v1) {
        const oldWords = JSON.parse(v1);
        const def = { id: 'd_' + uid(), name: '기본', created: Date.now() };
        state.decks = [def];
        state.currentDeckId = def.id;
        state.words = (Array.isArray(oldWords) ? oldWords : []).map(w => {
          const nw = { ...w, deckId: def.id, expressions: [] };
          ensureWordSrs(nw);
          return nw;
        });
        save();
        return;
      }
      ensureValidDeckState();
    } catch (e) {
      console.error('Load failed:', e);
      state.decks = [];
      state.currentDeckId = null;
      state.words = [];
      ensureValidDeckState();
    }
  }

  function ensureValidDeckState() {
    if (!state.decks || state.decks.length === 0) {
      const def = { id: 'd_' + uid(), name: '기본', created: Date.now() };
      state.decks = [def];
      state.currentDeckId = def.id;
    }
    if (!state.currentDeckId || !state.decks.find(d => d.id === state.currentDeckId)) {
      state.currentDeckId = state.decks[0].id;
    }
  }

  // ===== Cloud sync =====
  let pushTimer = null;
  let isSyncing = false;

  function setSyncStatus(status) {
    const el = $('#syncStatus');
    if (!el) return;
    el.classList.remove('synced', 'syncing', 'offline', 'error');
    el.classList.add(status);
    const labels = { synced: '동기화 됨', syncing: '동기화 중...', offline: '오프라인', error: '동기화 오류' };
    el.textContent = labels[status] || '';
  }

  async function syncPull() {
    if (!currentUser || isSyncing) return;
    if (state.quiz) return; // don't disrupt active quiz
    if (!navigator.onLine) { setSyncStatus('offline'); return; }
    isSyncing = true;
    setSyncStatus('syncing');
    try {
      const { data, error } = await sb
        .from('user_data')
        .select('data, updated_at')
        .eq('user_id', currentUser.id)
        .maybeSingle();
      if (error) throw error;

      if (!data) {
        // Server has no row yet — push local data up
        await syncPush(true);
        return;
      }

      const serverTime = new Date(data.updated_at).getTime();
      if (serverTime > (state.lastSyncedAt || 0)) {
        // Server is newer; replace local state
        const d = data.data || {};
        state.decks = Array.isArray(d.decks) ? d.decks : [];
        state.currentDeckId = d.currentDeckId;
        state.words = Array.isArray(d.words) ? d.words.map(w => {
          ensureExpressions(w);
          ensureWordSrs(w);
          w.expressions.forEach(ensureExprSrs);
          return w;
        }) : [];
        state.lastSyncedAt = serverTime;
        ensureValidDeckState();
        saveLocal();
        rerenderAfterSync();
      }
      setSyncStatus('synced');
    } catch (e) {
      console.error('Pull error:', e);
      setSyncStatus('error');
    } finally {
      isSyncing = false;
    }
  }

  async function syncPush(silent) {
    if (!currentUser) return;
    if (!navigator.onLine) { setSyncStatus('offline'); return; }
    if (!silent) setSyncStatus('syncing');
    try {
      const { data, error } = await sb
        .from('user_data')
        .upsert({
          user_id: currentUser.id,
          data: {
            decks: state.decks,
            currentDeckId: state.currentDeckId,
            words: state.words
          }
        }, { onConflict: 'user_id' })
        .select('updated_at')
        .single();
      if (error) throw error;
      state.lastSyncedAt = data ? new Date(data.updated_at).getTime() : Date.now();
      saveLocal();
      setSyncStatus('synced');
    } catch (e) {
      console.error('Push error:', e);
      setSyncStatus('error');
    }
  }

  function queuePush() {
    clearTimeout(pushTimer);
    setSyncStatus('syncing');
    pushTimer = setTimeout(() => {
      syncPush();
    }, 1500);
  }

  function rerenderAfterSync() {
    renderDeckBar();
    updateMeta();
    if ($('#panel-list').classList.contains('active')) renderList();
    if ($('#panel-quiz').classList.contains('active')) resetQuizView();
  }

  // ===== Auth =====
  async function showAuthOverlay() {
    $('#authOverlay').style.display = 'flex';
    $('#authError').textContent = '';
    $('#authEmail').value = '';
    $('#authPassword').value = '';
  }

  function hideAuthOverlay() {
    $('#authOverlay').style.display = 'none';
  }

  async function handleSignin() {
    const email = $('#authEmail').value.trim();
    const password = $('#authPassword').value;
    if (!email || !password) {
      $('#authError').textContent = '이메일과 비밀번호를 입력해줘';
      return;
    }
    $('#authError').textContent = '';
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      $('#authError').textContent = '로그인 실패: ' + error.message;
      return;
    }
    currentUser = data.user;
    hideAuthOverlay();
    await onAuthenticated();
  }

  async function handleSignup() {
    const email = $('#authEmail').value.trim();
    const password = $('#authPassword').value;
    if (!email || !password) {
      $('#authError').textContent = '이메일과 비밀번호를 입력해줘';
      return;
    }
    if (password.length < 6) {
      $('#authError').textContent = '비밀번호는 6자 이상';
      return;
    }
    $('#authError').textContent = '';
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) {
      $('#authError').textContent = '회원가입 실패: ' + error.message;
      return;
    }
    if (data.session) {
      currentUser = data.user;
      hideAuthOverlay();
      await onAuthenticated();
    } else {
      $('#authError').textContent = '이메일 확인 링크를 보냈어. 확인 후 로그인해.';
    }
  }

  async function handleLogout() {
    if (!confirm('로그아웃할까? 로컬 데이터는 남아있어.')) return;
    // Push final state before logout
    clearTimeout(pushTimer);
    await syncPush(true);
    await sb.auth.signOut();
    currentUser = null;
    setSyncStatus('offline');
    showAuthOverlay();
  }

  async function onAuthenticated() {
    // Pull from cloud first; if cloud is empty, our local data will be pushed up
    await syncPull();
    rerenderAfterSync();
  }

  function updateMeta() {
    const all = state.words.length;
    const inCurr = wordsInDeck(state.currentDeckId).length;
    $('#countList').textContent = inCurr;

    const deck = getCurrentDeck();
    if (all === 0) {
      $('#meta').textContent = '시작해보자';
    } else if (state.decks.length === 1) {
      $('#meta').textContent = `${all}개 단어`;
    } else {
      $('#meta').textContent = `전체 ${all}개 · ${state.decks.length}개 단어장`;
    }

    const ctx = $('#addContext');
    if (deck) {
      ctx.innerHTML = `현재 단어장: <strong>${escapeHtml(deck.name)}</strong>`;
    }
  }

  // ===== Tabs =====
  function switchTab(name) {
    $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    $$('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
    if (name === 'list') renderList();
    if (name === 'quiz') resetQuizView();
  }
  $$('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

  // ===== Decks =====
  function renderDeckBar() {
    const bar = $('#deckBar');
    const pills = state.decks.map(d => {
      const isActive = d.id === state.currentDeckId;
      const n = wordsInDeck(d.id).length;
      return `<button class="deck-pill ${isActive ? 'active' : ''}" data-deck="${d.id}">
        <span>${escapeHtml(d.name)}</span>
        <span class="deck-count">${n}</span>
      </button>`;
    }).join('');

    bar.innerHTML = pills + `<button class="deck-pill add" id="btnNewDeck">+ 새 단어장</button>`;

    bar.querySelectorAll('[data-deck]').forEach(b => {
      b.addEventListener('click', () => {
        const id = b.dataset.deck;
        if (id === state.currentDeckId) {

  function createDeck() {
    const name = prompt('새 단어장 이름');
    if (name === null) return;
    const trimmed = name.trim();
    if (!trimmed) { toast('이름을 입력해줘'); return; }
    if (state.decks.some(d => d.name === trimmed)) {
      toast('같은 이름의 단어장이 있어');
      return;
    }
    const deck = { id: 'd_' + uid(), name: trimmed, created: Date.now() };
    state.decks.push(deck);
    state.currentDeckId = deck.id;
    save();
    renderDeckBar();
    renderList();
    updateMeta();
    toast('단어장 생성됨');
  }

  function renameDeck(deckId) {
    const deck = state.decks.find(d => d.id === deckId);
    if (!deck) return;
    const name = prompt('새 이름', deck.name);
    if (name === null) return;
    const trimmed = name.trim();
    if (!trimmed) { toast('이름을 입력해줘'); return; }
    if (state.decks.some(d => d.id !== deckId && d.name === trimmed)) {
      toast('같은 이름의 단어장이 있어');
      return;
    }
    deck.name = trimmed;
    save();
    renderDeckBar();
    updateMeta();
    toast('이름 변경됨');
  }

  function deleteDeck(deckId) {
    if (state.decks.length <= 1) {
      toast('마지막 단어장은 삭제할 수 없어');
      return;
    }
    const deck = state.decks.find(d => d.id === deckId);
    if (!deck) return;
    const n = wordsInDeck(deckId).length;
    const msg = n > 0
      ? `"${deck.name}" 단어장과 그 안의 ${n}개 단어를 삭제할까? (되돌릴 수 없음)`
      : `"${deck.name}" 단어장을 삭제할까?`;
    if (!confirm(msg)) return;

    state.decks = state.decks.filter(d => d.id !== deckId);
    state.words = state.words.filter(w => w.deckId !== deckId);
    quizSelectedDecks.delete(deckId);
    if (state.currentDeckId === deckId) {
      state.currentDeckId = state.decks[0].id;

    save();
    renderDeckBar();
    renderList();
    updateMeta();
    toast('삭제됨');

  // ===== Speech =====
  function speak(text, lang) {

  // ===== SRS (Spaced Repetition) =====
  const DAY_MS = 86400000;

  function defaultSrs() {
    return {
      due: 0,        // 0 means "new card, due immediately"
      interval: 0,   // days; 0 means new/learning
      ease: 2.5,     // multiplier
      reps: 0,       // successful reps (Good/Easy without prior Again)
      lapses: 0      // times forgotten
    };
  }

  function ensureSrs(obj, key) {
    if (!obj[key] || typeof obj[key].due !== 'number') {
      obj[key] = defaultSrs();
    }
  }

  function ensureWordSrs(w) { ensureSrs(w, 'srs'); }
  function ensureExprSrs(e) {
    ensureSrs(e, 'srs');
    ensureSrs(e, 'srsBlank');
  }

  // Compute new SRS state from a rating ('again' | 'hard' | 'good' | 'easy')
  function updateSrs(srs, rating) {
    const now = Date.now();
    let { interval, ease, reps, lapses } = srs;
    let dueMs;
    const isNew = reps === 0;

    if (rating === 'again') {
      if (reps > 0) lapses += 1;
      interval = 0;
      reps = 0;
      ease = Math.max(1.3, ease - 0.2);
      dueMs = now + 60000; // 1 min
    } else if (rating === 'hard') {
      if (isNew) {
        interval = 0;
        dueMs = now + 6 * 60000; // 6 min
      } else {
        interval = Math.max(Math.round(interval * 1.2), interval + 1);
        dueMs = now + interval * DAY_MS;
        reps += 1;
      }
      ease = Math.max(1.3, ease - 0.15);
    } else if (rating === 'good') {
      if (isNew) {
        interval = 1;
        reps = 1;
      } else {
        interval = Math.max(1, Math.round(interval * ease));
        reps += 1;
      }
      dueMs = now + interval * DAY_MS;
    } else if (rating === 'easy') {
      if (isNew) {
        interval = 4;
        reps = 1;
      } else {
        interval = Math.max(1, Math.round(interval * ease * 1.3));
        reps += 1;
      }
      ease = Math.min(3.0, ease + 0.15);
      dueMs = now + interval * DAY_MS;
    }
    return { due: dueMs, interval, ease, reps, lapses };
  }

  function formatTime(ms) {
    if (ms < 0) ms = 0;
    const min = ms / 60000;
    if (min < 60) return Math.max(1, Math.round(min)) + '분';
    const hr = ms / 3600000;
    if (hr < 24) return Math.round(hr) + '시간';
    const day = ms / 86400000;
    if (day < 30) return Math.round(day) + '일';
    if (day < 365) return Math.round(day / 30) + '달';
    return (day / 365).toFixed(1) + '년';
  }

  function previewInterval(srs, rating) {
    const ns = updateSrs(srs, rating);
    return formatTime(ns.due - Date.now());
  }

  function getCardSrs(card) {
    if (card.kind === 'head') return card.word.srs;
    if (card.kind === 'expr') return card.expr.srs;
    if (card.kind === 'blank') return card.expr.srsBlank;
  }

  function setCardSrs(card, ns) {
    if (card.kind === 'head') card.word.srs = ns;
    else if (card.kind === 'expr') card.expr.srs = ns;
    else if (card.kind === 'blank') card.expr.srsBlank = ns;
  }

  // ===== Blank helpers =====
  // Find headword in a sentence. Word boundary for ASCII, plain match for non-ASCII.
  // Also tries the headword without leading articles (la/el/the/a/an/un/una/los/las).
  function findTermInText(term, text) {
    if (!term || !text) return null;
    const candidates = [term];
    // Strip common articles
    const stripped = term.replace(/^(la|el|los|las|un|una|unos|unas|the|a|an)\s+/i, '');
    if (stripped !== term && stripped.length > 0) candidates.push(stripped);

    for (const c of candidates) {
      const isAscii = /^[A-Za-zÀ-ÿ\s'\-]+$/.test(c);
      let m;
      if (isAscii) {
        const re = new RegExp(`\\b${escapeRegex(c)}\\b`, 'i');
        m = text.match(re);
      } else {
        const idx = text.toLowerCase().indexOf(c.toLowerCase());
        m = idx === -1 ? null : { index: idx, 0: text.substr(idx, c.length) };
      }
      if (m) {
        const matched = m[0];
        return { index: m.index, length: matched.length, matched };
      }
    }
    return null;
  }

  // ===== Quiz card building =====
  // Cards have shape:
  //   { kind: 'head', word, dir }
  //   { kind: 'expr', word, expr, dir }
  //   { kind: 'blank', word, expr, match: {index,length,matched} }
  function buildCards(words, mode) {
    const cards = [];
    for (const w of words) {
      const exps = w.expressions || [];
      if (mode === 'blank') {
        // Only blank cards from expressions whose example contains the headword
        for (const e of exps) {
          if (!e.example) continue;
          const m = findTermInText(w.term, e.example);
          if (m) cards.push({ kind: 'blank', word: w, expr: e, match: m });
        }
      } else if (mode === 't2m' || mode === 'm2t') {
        // Headword card + each expression card
        cards.push({ kind: 'head', word: w, dir: mode });
        for (const e of exps) {
          cards.push({ kind: 'expr', word: w, expr: e, dir: mode });
        }
      } else if (mode === 'mix') {
        // Head card with random direction
        cards.push({ kind: 'head', word: w, dir: Math.random() < 0.5 ? 't2m' : 'm2t' });
        for (const e of exps) {
          // Decide: t2m, m2t, or blank if eligible
          const opts = ['t2m', 'm2t'];
          let blankMatch = null;
          if (e.example) {
            blankMatch = findTermInText(w.term, e.example);
            if (blankMatch) opts.push('blank');
          }
          const pick = opts[Math.floor(Math.random() * opts.length)];
          if (pick === 'blank') {
            cards.push({ kind: 'blank', word: w, expr: e, match: blankMatch });
          } else {
            cards.push({ kind: 'expr', word: w, expr: e, dir: pick });
          }
        }
      }
    }
    return cards;
  }

  // ===== Quiz =====
  let quizDir = 't2m';
  let quizN = 10;

  $$('#dirOpts .opt').forEach(o => {
    o.addEventListener('click', () => {
      $$('#dirOpts .opt').forEach(x => x.classList.remove('active'));
      o.classList.add('active');
      quizDir = o.dataset.dir;
    });
  });
  $$('#countOpts .opt').forEach(o => {
    o.addEventListener('click', () => {
      $$('#countOpts .opt').forEach(x => x.classList.remove('active'));
      o.classList.add('active');
      quizN = o.dataset.n === 'all' ? 'all' : parseInt(o.dataset.n);
    });
  });

  function renderQuizDeckSelector() {
    const container = $('#quizDeckOpts');
    container.innerHTML = state.decks.map(d => {
      const n = wordsInDeck(d.id).length;
      const sel = quizSelectedDecks.has(d.id);
      return `<button class="opt ${sel ? 'active' : ''}" data-deck-quiz="${d.id}">
        ${escapeHtml(d.name)}<span class="quiz-deck-count">${n}</span>
      </button>`;
    }).join('');
    container.querySelectorAll('[data-deck-quiz]').forEach(b => {
      b.addEventListener('click', () => {
        const id = b.dataset.deckQuiz;
        if (quizSelectedDecks.has(id)) {
          if (quizSelectedDecks.size > 1) quizSelectedDecks.delete(id);
        } else {
          quizSelectedDecks.add(id);
        }
        renderQuizDeckSelector();
      });
    });
  }

  function resetQuizView() {
    $('#quizSetup').style.display = 'block';
    $('#quizCard').style.display = 'none';
    $('#quizResult').style.display = 'none';

    const validIds = new Set(state.decks.map(d => d.id));
    quizSelectedDecks = new Set([...quizSelectedDecks].filter(id => validIds.has(id)));
    if (quizSelectedDecks.size === 0) {
      quizSelectedDecks.add(state.currentDeckId);
    }
    renderQuizDeckSelector();
  }

  $('#btnStartQuiz').addEventListener('click', () => {
    if (quizSelectedDecks.size === 0) {
      toast('단어장을 하나 이상 선택해줘');
      return;
    }
    const wordsPool = state.words.filter(w => quizSelectedDecks.has(w.deckId));
    if (wordsPool.length === 0) {
      toast('선택한 단어장에 단어가 없어');
      return;
    }

    let cards = buildCards(wordsPool, quizDir);
    if (cards.length === 0) {
      if (quizDir === 'blank') {
        toast('예문 안에 헤드워드가 들어간 표현이 없어');
      } else {
        toast('출제할 카드가 없어');
      }
      return;
    }

    // Prioritize by SRS due date: most overdue first, with small jitter
    const now = Date.now();
    cards.forEach(c => {
      const srs = getCardSrs(c) || defaultSrs();
      // Higher score = higher priority. Overdue cards get high scores.
      c._priority = (now - srs.due) / DAY_MS + Math.random() * 0.3;
    });
    cards.sort((a, b) => b._priority - a._priority);

    const total = quizN === 'all' ? cards.length : Math.min(quizN, cards.length);
    cards = cards.slice(0, total);

    state.quiz = {
      cards,
      idx: 0,
      correct: 0,
      missed: []
    };

    $('#quizSetup').style.display = 'none';
    $('#quizCard').style.display = 'block';
    $('#quizResult').style.display = 'none';
    showQuestion();
  });

  function kindLabel(card) {
    if (card.kind === 'head') return '단어';
    if (card.kind === 'expr') return '표현';
    if (card.kind === 'blank') return '빈칸';
    return '';
  }

  function showQuestion() {
    const card = state.quiz.cards[state.quiz.idx];
    $('#quizProgress').textContent = `${state.quiz.idx + 1} / ${state.quiz.cards.length}`;
    $('#quizKind').textContent = kindLabel(card);

    const qEl = $('#quizQuestion');
    const hintEl = $('#quizHint');
    const ctxEl = $('#quizContext');
    const aEl = $('#quizAnswer');

    qEl.classList.remove('is-sentence', 'is-phrase');
    aEl.style.display = 'none';
    ctxEl.textContent = '';

    if (card.kind === 'blank') {
      // Show example with headword blanked. Context: optionally show expr's meaning.
      const w = card.word;
      const e = card.expr;
      const m = card.match;
      const before = e.example.slice(0, m.index);
      const after = e.example.slice(m.index + m.length);
      qEl.classList.add('is-sentence');
      qEl.innerHTML = escapeHtml(before)
        + '<span class="blank-mark">' + escapeHtml(m.matched) + '</span>'
        + escapeHtml(after);
      // Show the expression's meaning as context (helpful hint)
      ctxEl.textContent = `(표현: ${e.phrase} — ${e.meaning})`;
      hintEl.textContent = `'${w.term}' 의 변형 또는 동일한 형태를 입력`;

      $('#quizControls').innerHTML = `
        <div class="quiz-blank-input-row">
          <input type="text" id="blankInput" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="입력...">
          <button class="btn" id="btnCheck">확인</button>
        </div>
      `;
      const inp = $('#blankInput');
      setTimeout(() => inp.focus(), 50);
      inp.addEventListener('keydown', ev => {
        if (ev.key === 'Enter') { ev.preventDefault(); checkBlank(); }
      });
      $('#btnCheck').addEventListener('click', checkBlank);
    } else if (card.kind === 'expr') {
      const e = card.expr;
      const w = card.word;
      const deckLang = getDeckLang(w.deckId);
      const isT2M = card.dir === 't2m';
      qEl.classList.add('is-phrase');
      const question = isT2M ? e.phrase : e.meaning;
      qEl.innerHTML = escapeHtml(question);
      if (isT2M) {
        const btn = document.createElement('button');
        btn.className = 'speak-btn';
        btn.title = '발음';
        btn.textContent = '♪';
        btn.addEventListener('click', () => speak(e.phrase, deckLang));
        qEl.appendChild(btn);
      }
      ctxEl.textContent = `(헤드워드: ${w.term} — ${w.meaning})`;
      hintEl.textContent = isT2M ? '뜻은?' : '표현은?';
      $('#quizControls').innerHTML = `<button class="btn" id="btnReveal">정답 보기</button>`;
      $('#btnReveal').addEventListener('click', revealAnswer);
    } else {
      // head
      const w = card.word;
      const deckLang = getDeckLang(w.deckId);
      const isT2M = card.dir === 't2m';
      const question = isT2M ? w.term : w.meaning;
      qEl.innerHTML = escapeHtml(question);
      if (isT2M) {
        const btn = document.createElement('button');
        btn.className = 'speak-btn';
        btn.title = '발음';
        btn.textContent = '♪';
        btn.addEventListener('click', () => speak(w.term, deckLang));
        qEl.appendChild(btn);
      }
      hintEl.textContent = isT2M ? '뜻은?' : '단어는?';
      $('#quizControls').innerHTML = `<button class="btn" id="btnReveal">정답 보기</button>`;
      $('#btnReveal').addEventListener('click', revealAnswer);
    }
  }

  // Render the 4-grade evaluation buttons for the current card.
  function renderGradeButtons() {
    const card = state.quiz.cards[state.quiz.idx];
    const srs = getCardSrs(card) || defaultSrs();
    const wrap = $('#quizControls');
    wrap.innerHTML = `
      <div class="grade-row">
        <button class="btn-grade btn-again" data-rating="again">다시<span class="interval">${previewInterval(srs, 'again')}</span></button>
        <button class="btn-grade btn-hard" data-rating="hard">어려움<span class="interval">${previewInterval(srs, 'hard')}</span></button>
        <button class="btn-grade btn-good" data-rating="good">좋음<span class="interval">${previewInterval(srs, 'good')}</span></button>
        <button class="btn-grade btn-easy" data-rating="easy">쉬움<span class="interval">${previewInterval(srs, 'easy')}</span></button>
      </div>
    `;
    wrap.querySelectorAll('[data-rating]').forEach(b => {
      b.addEventListener('click', () => grade(b.dataset.rating));
    });
  }

  function revealAnswer() {
    const card = state.quiz.cards[state.quiz.idx];
    const deckLang = getDeckLang(card.word.deckId);
    let answer, sub, speakText = null;
    if (card.kind === 'head') {
      answer = card.dir === 't2m' ? card.word.meaning : card.word.term;
      if (card.dir === 'm2t') speakText = card.word.term;
    } else if (card.kind === 'expr') {
      answer = card.dir === 't2m' ? card.expr.meaning : card.expr.phrase;
      if (card.dir === 'm2t') speakText = card.expr.phrase;
      if (card.expr.example) {
        let exHtml = `<button class="speak-btn-tiny" data-speak-ex>♪</button> ` + escapeHtml(card.expr.example);
        if (card.expr.exampleMeaning) {
          exHtml += `<br><span style="font-style:normal;font-size:12px;">${escapeHtml(card.expr.exampleMeaning)}</span>`;
        }
        sub = exHtml;
      }
    }

    const a = $('#quizAnswer');
    let answerHtml = escapeHtml(answer);
    if (speakText) {
      answerHtml += ` <button class="speak-btn-tiny" data-speak-answer>♪</button>`;
    }
    a.innerHTML = answerHtml + (sub ? `<span class="note">${sub}</span>` : '');
    a.style.display = 'block';

    if (speakText) {
      const b = a.querySelector('[data-speak-answer]');
      if (b) b.addEventListener('click', () => speak(speakText, deckLang));
    }
    if (card.kind === 'expr' && card.expr.example) {
      const b = a.querySelector('[data-speak-ex]');
      if (b) b.addEventListener('click', () => speak(card.expr.example, deckLang));
    }

    renderGradeButtons();
  }

  function checkBlank() {
    const input = $('#blankInput');
    const userAns = input.value.trim();
    if (!userAns) return;

    const card = state.quiz.cards[state.quiz.idx];
    const w = card.word;
    const e = card.expr;
    const m = card.match;
    const correct = m.matched; // whatever appeared in the sentence

    const userL = userAns.toLowerCase();
    const correctL = correct.toLowerCase();
    const termL = w.term.toLowerCase();
    // Accept either: the exact matched form, the headword as-is, or stripped-article form
    const acceptable = new Set([correctL, termL, termL.replace(/^(la|el|los|las|un|una|unos|unas|the|a|an)\s+/, '')]);
    const isCorrect = acceptable.has(userL);

    const qEl = $('#quizQuestion');
    const before = e.example.slice(0, m.index);
    const after = e.example.slice(m.index + m.length);
    const cls = isCorrect ? 'correct' : 'wrong';
    qEl.innerHTML = escapeHtml(before)
      + '<span class="blank-filled ' + cls + '">' + escapeHtml(m.matched) + '</span>'
      + escapeHtml(after);

    // Speak button for the full example (now safe to play, answer revealed)
    const speakBtn = document.createElement('button');
    speakBtn.className = 'speak-btn-tiny';
    speakBtn.title = '발음';
    speakBtn.textContent = '♪';
    speakBtn.addEventListener('click', () => speak(e.example, getDeckLang(w.deckId)));
    qEl.appendChild(speakBtn);

    const a = $('#quizAnswer');
    let feedback;
    if (isCorrect) {
      feedback = `<span class="quiz-feedback correct">✓ 정답</span>`;
    } else {
      feedback = `<span class="quiz-feedback wrong"><span class="user-ans">${escapeHtml(userAns)}</span><span class="arrow">→</span><span class="correct-ans">${escapeHtml(m.matched)}</span></span>`;
    }
    let exampleMeaningHtml = '';
    if (e.exampleMeaning) {
      exampleMeaningHtml = `<span class="note" style="font-style:normal;">${escapeHtml(e.exampleMeaning)}</span>`;
    }
    a.innerHTML = feedback + `<span class="note">${escapeHtml(e.phrase)} — ${escapeHtml(e.meaning)}</span>` + exampleMeaningHtml;
    a.style.display = 'block';

    renderGradeButtons();
    // Hint: pre-focus the suggested rating
    const suggested = isCorrect ? 'good' : 'again';
    setTimeout(() => {
      const btn = $('#quizControls').querySelector(`[data-rating="${suggested}"]`);
      if (btn) btn.focus();
    }, 50);
  }

  function grade(rating) {
    const card = state.quiz.cards[state.quiz.idx];
    const isWrong = rating === 'again';

    // Update SRS state (mutates the live word/expression object)
    const oldSrs = getCardSrs(card) || defaultSrs();
    const newSrs = updateSrs(oldSrs, rating);
    setCardSrs(card, newSrs);

    // Update plain stats counters (display)
    const w = state.words.find(x => x.id === card.word.id);
    if (w) {
      if (card.kind === 'head') {
        if (isWrong) w.wrong = (w.wrong || 0) + 1;
        else w.correct = (w.correct || 0) + 1;
      } else if (w.expressions) {
        const e = w.expressions.find(x => x.id === card.expr.id);
        if (e) {
          if (isWrong) e.wrong = (e.wrong || 0) + 1;
          else e.correct = (e.correct || 0) + 1;
        }
      }
    }

    if (isWrong) {
      state.quiz.missed.push(card);
    } else {
      state.quiz.correct++;
    }

    save();
    state.quiz.idx++;

    if (state.quiz.idx >= state.quiz.cards.length) {
      finishQuiz();
    } else {
      showQuestion();
    }
  }

  function finishQuiz() {
    $('#quizCard').style.display = 'none';
    $('#quizResult').style.display = 'block';

    const total = state.quiz.cards.length;
    const correct = state.quiz.correct;
    const ratio = correct / total;

    $('#resCorrect').textContent = correct;
    $('#resTotal').textContent = total;

    let label;
    if (ratio === 1) label = '완벽해';
    else if (ratio >= 0.8) label = '훌륭해';
    else if (ratio >= 0.6) label = '나쁘지 않아';
    else if (ratio >= 0.3) label = '다시 한 번';
    else label = '천천히, 다시';
    $('#resLabel').textContent = label;

    if (state.quiz.missed.length > 0) {
      $('#resMissed').style.display = 'block';
      $('#resMissedList').innerHTML = state.quiz.missed.map(card => {
        if (card.kind === 'head') {
          return `<div class="result-missed-item">
            <div class="ctx">단어</div>
            <div class="t">${escapeHtml(card.word.term)}</div>
            <div class="m">${escapeHtml(card.word.meaning)}</div>
          </div>`;
        } else if (card.kind === 'expr') {
          return `<div class="result-missed-item">
            <div class="ctx">표현</div>
            <div class="t">${escapeHtml(card.expr.phrase)}</div>
            <div class="m">${escapeHtml(card.expr.meaning)}</div>
          </div>`;
        } else {
          return `<div class="result-missed-item">
            <div class="ctx">빈칸 — ${escapeHtml(card.expr.phrase)}</div>
            <div class="t">${escapeHtml(card.expr.example)}</div>
            <div class="m">정답: ${escapeHtml(card.match.matched)}</div>
          </div>`;
        }
      }).join('');
    } else {
      $('#resMissed').style.display = 'none';
    }
  }

  $('#btnRestart').addEventListener('click', resetQuizView);

  // ===== Export / Import =====
  $('#btnExport').addEventListener('click', () => {
    const data = JSON.stringify({
      version: 3,
      decks: state.decks,
      words: state.words,
      exported: new Date().toISOString()
    }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `vocab-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('내보냄');
  });

  $('#btnImport').addEventListener('click', () => $('#fileInput').click());
  $('#fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const text = ev.target.result;
        const parsed = JSON.parse(text);
        let added = 0;

        if (Array.isArray(parsed)) {
          // Old flat array → import to current deck
          const existing = new Set(
            wordsInDeck(state.currentDeckId).map(w => w.term.toLowerCase())
          );
          parsed.forEach(w => {
            if (!w.term || !w.meaning) return;
            if (existing.has(w.term.toLowerCase())) return;
            const nw = {
              id: uid(),
              deckId: state.currentDeckId,
              term: w.term,
              meaning: w.meaning,
              expressions: Array.isArray(w.expressions) ? w.expressions.map(e => {
                const ne = {
                  id: e.id || uid(),
                  phrase: e.phrase, meaning: e.meaning,
                  example: e.example || '',
                  exampleMeaning: e.exampleMeaning || '',
                  correct: e.correct || 0, wrong: e.wrong || 0
                };
                if (e.srs) ne.srs = e.srs;
                if (e.srsBlank) ne.srsBlank = e.srsBlank;
                ensureExprSrs(ne);
                return ne;
              }) : [],
              created: w.created || Date.now(),
              correct: w.correct || 0,
              wrong: w.wrong || 0
            };
            if (w.srs) nw.srs = w.srs;
            ensureWordSrs(nw);
            state.words.unshift(nw);
            added++;
          });
        } else if (parsed && Array.isArray(parsed.decks) && Array.isArray(parsed.words)) {
          const deckIdMap = {};
          parsed.decks.forEach(d => {
            const ex = state.decks.find(x => x.name === d.name);
            if (ex) {
              deckIdMap[d.id] = ex.id;
            } else {
              const newDeck = {
                id: 'd_' + uid(),
                name: d.name,
                created: d.created || Date.now()
              };
              state.decks.push(newDeck);
              deckIdMap[d.id] = newDeck.id;
            }
          });
          const existingKeys = new Set(
            state.words.map(w => `${w.deckId}::${w.term.toLowerCase()}`)
          );
          parsed.words.forEach(w => {
            if (!w.term || !w.meaning) return;
            const newDeckId = deckIdMap[w.deckId] || state.currentDeckId;
            const key = `${newDeckId}::${w.term.toLowerCase()}`;
            if (existingKeys.has(key)) return;
            existingKeys.add(key);
            const nw = {
              id: uid(),
              deckId: newDeckId,
              term: w.term,
              meaning: w.meaning,
              expressions: Array.isArray(w.expressions) ? w.expressions.map(e => {
                const ne = {
                  id: e.id || uid(),
                  phrase: e.phrase, meaning: e.meaning,
                  example: e.example || '',
                  exampleMeaning: e.exampleMeaning || '',
                  correct: e.correct || 0, wrong: e.wrong || 0
                };
                if (e.srs) ne.srs = e.srs;
                if (e.srsBlank) ne.srsBlank = e.srsBlank;
                ensureExprSrs(ne);
                return ne;
              }) : [],
              created: w.created || Date.now(),
              correct: w.correct || 0,
              wrong: w.wrong || 0
            };
            if (w.srs) nw.srs = w.srs;
            ensureWordSrs(nw);
            state.words.unshift(nw);
            added++;
          });
        } else {
          throw new Error('Unknown JSON format');
        }
        save();
        renderDeckBar();
        renderList();
        updateMeta();
        toast(`${added}개 추가됨`);
      } catch (err) {
        console.error(err);
        toast('파일을 읽을 수 없어');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  $('#btnReset').addEventListener('click', () => {
    if (state.words.length === 0 && state.decks.length <= 1) {
      toast('이미 비어있어');
      return;
    }
    if (confirm(`전체 단어장(${state.decks.length}개)과 단어(${state.words.length}개)를 모두 삭제할까? (되돌릴 수 없음)`)) {
      state.decks = [];
      state.words = [];
      state.currentDeckId = null;
      quizSelectedDecks = new Set();
      ensureValidDeckState();
      save();
      renderDeckBar();
      renderList();
      updateMeta();
      toast('전체 삭제됨');
    }
  });

  // ===== Init =====
  // Local state always loads first (instant render, offline-friendly)
  load();
  renderDeckBar();
  updateMeta();
  renderList();

  // Auth + sync wiring
  $('#btnSignin').addEventListener('click', handleSignin);
  $('#btnSignup').addEventListener('click', handleSignup);
  $('#btnLogout').addEventListener('click', handleLogout);
  $('#authPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); handleSignin(); }
  });
  $('#authEmail').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); $('#authPassword').focus(); }
  });

  // Pull on focus / visibility change (catch updates from other devices)
  window.addEventListener('focus', () => { if (currentUser) syncPull(); });
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && currentUser) syncPull();
  });
  // Retry push when coming back online
  window.addEventListener('online', () => {
    if (currentUser) syncPush();
  });
  window.addEventListener('offline', () => setSyncStatus('offline'));

  // Check existing session
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session && session.user) {
      currentUser = session.user;
      await onAuthenticated();
      $('#inputTerm').focus();
    } else {
      setSyncStatus('offline');
      showAuthOverlay();
      $('#authEmail').focus();
    }
  })();

  // React to auth state changes (token refresh, sign out from another tab, etc.)
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT') {
      currentUser = null;
      setSyncStatus('offline');
      showAuthOverlay();
    } else if (event === 'SIGNED_IN' && session && !currentUser) {
      currentUser = session.user;
      hideAuthOverlay();
      onAuthenticated();
    }
  });
</script>
</body>
</html>
